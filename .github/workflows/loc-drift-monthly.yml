name: LOC Drift Monthly

on:
  schedule:
    # First day of each month at 10am Eastern (14:00 UTC)
    - cron: '0 14 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  loc-drift:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install cloc
        run: |
          sudo apt-get update
          sudo apt-get install -y cloc

      - name: Generate LOC drift report
        run: |
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          OUTPUT_DIR="docs/org-audit-${YEAR}-$(printf '%02d' $((10#$MONTH)))"
          mkdir -p "$OUTPUT_DIR"
          OUTPUT_FILE="$OUTPUT_DIR/loc_drift_${YEAR}_${MONTH}.md"

          {
            echo "# LOC Drift Report — $(date +%Y-%m-%d)"
            echo ""
            echo "**Generated:** $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "**Excludes:** .git/, node_modules/, .worktrees/, target/, build/, dist/"
            echo ""
            echo '```'
            cloc . \
              --exclude-dir=.git,node_modules,.worktrees,target,build,dist,.cargo,.archive \
              --exclude-list-file=.cloc-exclude \
              --json | python3 -m json.tool
            echo '```'
            echo ""
            echo "## Summary"
            cloc . \
              --exclude-dir=.git,node_modules,.worktrees,target,build,dist,.cargo,.archive \
              --exclude-list-file=.cloc-exclude \
              --quiet
          } > "$OUTPUT_FILE"

          echo "Report written to $OUTPUT_FILE"

      - name: Commit LOC report
        run: |
          git config user.name "loc-drift-bot"
          git config user.email "audit@phenotype.org"
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          OUTPUT_DIR="docs/org-audit-${YEAR}-$(printf '%02d' $((10#$MONTH)))"

          git add "$OUTPUT_DIR/loc_drift_*.md"
          if git diff --cached --quiet; then
            echo "No LOC changes to commit"
          else
            git commit -m "chore(org-audit): monthly LOC drift report — $(date +%Y-%m) [skip ci]"
            git push
          fi
        continue-on-error: true
