version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
      include: scope
    groups:
      minor:
        update-types:
          - minor
          - patch
      major:
        update-types:
          - major
