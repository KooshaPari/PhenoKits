openapi: 3.0.3
info:
  title: BytePort API
  description: |
    BytePort is a multi-cloud deployment platform that enables seamless deployment 
    across AWS, GCP, Azure, and other cloud providers. This API follows hexagonal 
    architecture principles with clean separation between domain, application, and 
    infrastructure layers.
  version: 1.0.0
  contact:
    name: BytePort API Support
    url: https://byte.kooshapari.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://byte.kooshapari.com/api/v1
    description: Production server
  - url: http://localhost:8080/api/v1
    description: Local development server

security:
  - BearerAuth: []

tags:
  - name: Deployments
    description: Deployment management operations
  - name: Health
    description: Health check and system status endpoints

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check endpoint
      description: Returns the health status of the API server
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"
                  version:
                    type: string
                    example: "1.0.0"
                  timestamp:
                    type: string
                    format: date-time

  /deployments:
    get:
      tags:
        - Deployments
      summary: List deployments
      description: Retrieve a paginated list of deployments
      operationId: listDeployments
      parameters:
        - name: offset
          in: query
          description: Number of deployments to skip
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          description: Maximum number of deployments to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: owner
          in: query
          description: Filter by owner ID
          schema:
            type: string
        - name: project_uuid
          in: query
          description: Filter by project UUID
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          description: Filter by deployment status
          schema:
            $ref: '#/components/schemas/DeploymentStatus'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  deployments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Deployment'
                  total:
                    type: integer
                  offset:
                    type: integer
                  limit:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Deployments
      summary: Create a new deployment
      description: Create a new deployment with the specified configuration
      operationId: createDeployment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeploymentRequest'
      responses:
        '201':
          description: Deployment created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /deployments/{uuid}:
    get:
      tags:
        - Deployments
      summary: Get deployment by UUID
      description: Retrieve detailed information about a specific deployment
      operationId: getDeployment
      parameters:
        - name: uuid
          in: path
          required: true
          description: Deployment UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - Deployments
      summary: Terminate deployment
      description: Terminate a deployment and clean up resources
      operationId: terminateDeployment
      parameters:
        - name: uuid
          in: path
          required: true
          description: Deployment UUID
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deployment terminated successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /deployments/{uuid}/status:
    patch:
      tags:
        - Deployments
      summary: Update deployment status
      description: Update the status of a deployment
      operationId: updateDeploymentStatus
      parameters:
        - name: uuid
          in: path
          required: true
          description: Deployment UUID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  $ref: '#/components/schemas/DeploymentStatus'
      responses:
        '200':
          description: Status updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /deployments/{uuid}/logs:
    get:
      tags:
        - Deployments
      summary: Stream deployment logs
      description: Stream real-time logs for a deployment using Server-Sent Events (SSE)
      operationId: streamDeploymentLogs
      parameters:
        - name: uuid
          in: path
          required: true
          description: Deployment UUID
          schema:
            type: string
            format: uuid
        - name: follow
          in: query
          description: Continue streaming new logs as they arrive
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: SSE stream of log messages
          content:
            text/event-stream:
              schema:
                type: object
                properties:
                  level:
                    type: string
                    enum: [debug, info, warning, error]
                  message:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
                  service:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /deployments/{uuid}/metrics:
    get:
      tags:
        - Deployments
      summary: Stream deployment metrics
      description: Stream real-time metrics for a deployment using Server-Sent Events (SSE)
      operationId: streamDeploymentMetrics
      parameters:
        - name: uuid
          in: path
          required: true
          description: Deployment UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: SSE stream of metrics
          content:
            text/event-stream:
              schema:
                type: object
                properties:
                  cpu_usage:
                    type: number
                    format: float
                  memory_usage:
                    type: number
                    format: float
                  network_in:
                    type: number
                    format: float
                  network_out:
                    type: number
                    format: float
                  timestamp:
                    type: string
                    format: date-time
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from WorkOS AuthKit

  schemas:
    Deployment:
      type: object
      required:
        - uuid
        - name
        - owner
        - status
        - created_at
        - updated_at
      properties:
        uuid:
          type: string
          format: uuid
          description: Unique identifier for the deployment
        name:
          type: string
          description: Human-readable name for the deployment
          example: "my-api-production"
        owner:
          type: string
          description: User ID of the deployment owner
          example: "user_2N..." 
        project_uuid:
          type: string
          format: uuid
          description: UUID of the associated project
          nullable: true
        status:
          $ref: '#/components/schemas/DeploymentStatus'
        providers:
          type: object
          description: Cloud provider configurations
          additionalProperties:
            type: object
          example:
            aws:
              region: "us-east-1"
              instance_type: "t3.micro"
        services:
          type: array
          items:
            $ref: '#/components/schemas/DeploymentService'
        env_vars:
          type: object
          description: Environment variables
          additionalProperties:
            type: string
          example:
            NODE_ENV: "production"
            DATABASE_URL: "postgresql://..."
        build_config:
          $ref: '#/components/schemas/BuildConfig'
        cost_info:
          $ref: '#/components/schemas/CostInfo'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deployed_at:
          type: string
          format: date-time
          nullable: true
        terminated_at:
          type: string
          format: date-time
          nullable: true

    DeploymentStatus:
      type: string
      enum:
        - pending
        - detecting
        - provisioning
        - deploying
        - deployed
        - failed
        - terminated
      description: |
        Status of the deployment:
        * `pending` - Initial state, waiting to start
        * `detecting` - Analyzing application requirements
        * `provisioning` - Setting up cloud resources
        * `deploying` - Deploying application code
        * `deployed` - Successfully deployed and running
        * `failed` - Deployment failed
        * `terminated` - Deployment has been terminated

    DeploymentService:
      type: object
      required:
        - name
        - type
        - provider
      properties:
        name:
          type: string
          description: Service name
          example: "web"
        type:
          type: string
          description: Service type
          enum: [frontend, backend, database]
          example: "frontend"
        provider:
          type: string
          description: Cloud provider
          example: "vercel"
        status:
          type: string
          description: Service status
          example: "running"
        url:
          type: string
          format: uri
          description: Service URL
          example: "https://my-app.vercel.app"

    BuildConfig:
      type: object
      properties:
        framework:
          type: string
          description: Application framework
          example: "nodejs"
        build_command:
          type: string
          description: Command to build the application
          example: "npm run build"
        start_command:
          type: string
          description: Command to start the application
          example: "npm start"
        install_command:
          type: string
          description: Command to install dependencies
          example: "npm install"

    CostInfo:
      type: object
      properties:
        monthly:
          type: number
          format: float
          description: Estimated monthly cost in USD
          example: 25.50
        breakdown:
          type: object
          description: Cost breakdown by resource
          additionalProperties:
            type: number
            format: float
          example:
            compute: 15.00
            storage: 5.50
            network: 5.00

    CreateDeploymentRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Human-readable name for the deployment
          example: "my-api-production"
        project_uuid:
          type: string
          format: uuid
          description: UUID of the associated project
        providers:
          type: object
          description: Cloud provider configurations
          additionalProperties:
            type: object
        services:
          type: array
          items:
            $ref: '#/components/schemas/DeploymentService'
        env_vars:
          type: object
          description: Environment variables
          additionalProperties:
            type: string
        build_config:
          $ref: '#/components/schemas/BuildConfig'

    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Error code
          example: "VALIDATION_ERROR"
        message:
          type: string
          description: Human-readable error message
          example: "Deployment name cannot be empty"
        details:
          type: object
          description: Additional error details
          additionalProperties: true

  responses:
    BadRequest:
      description: Bad request - Invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "VALIDATION_ERROR"
            message: "Invalid request parameters"

    Unauthorized:
      description: Unauthorized - Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "UNAUTHORIZED"
            message: "Authentication required"

    NotFound:
      description: Not found - Resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "NOT_FOUND"
            message: "Deployment not found"

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "INTERNAL_ERROR"
            message: "An unexpected error occurred"
