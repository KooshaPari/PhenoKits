openapi: 3.1.0
info:
  title: BytePort API
  version: 1.0.0
  description: |
    BytePort API for deploying applications to multiple cloud providers and self-hosted targets.

    ## Authentication
    All protected endpoints require Bearer token authentication:
    ```
    Authorization: Bearer bp_sk_...
    ```

    ## Rate Limits
    - 100 requests/minute for free tier
    - 1000 requests/minute for pro tier

    ## Features
    - Multi-cloud deployment orchestration
    - Auto-detection of application type
    - Cost estimation across providers
    - Real-time deployment logs
    - Self-hosted target support

  contact:
    name: BytePort Support
    email: api@byteport.io
    url: https://byteport.io/support
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.byteport.io
    description: Production
  - url: http://localhost:8081
    description: Local development

security:
  - BearerAuth: []

tags:
  - name: Authentication
    description: User authentication and authorization
  - name: Deployments
    description: Deployment operations and management
  - name: Projects
    description: Project management
  - name: Providers
    description: Cloud provider operations
  - name: Hosts
    description: Self-hosted target management
  - name: Detection
    description: Application type detection
  - name: Cost
    description: Cost estimation and tracking
  - name: Logs
    description: Deployment logs and monitoring

paths:
  # Authentication endpoints
  /signup:
    post:
      summary: User signup
      description: Create a new user account
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
            examples:
              basic:
                summary: Basic signup
                value:
                  name: John Doe
                  email: john@example.com
                  password: SecureP@ss123
      responses:
        '200':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /login:
    post:
      summary: User login
      description: Authenticate user and receive access token
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              basic:
                summary: Basic login
                value:
                  email: john@example.com
                  password: SecureP@ss123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /authenticate:
    get:
      summary: Verify authentication
      description: Check if the current token is valid
      tags: [Authentication]
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  authenticated:
                    type: boolean
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized

  # Deployment endpoints
  /deploy:
    post:
      summary: Create deployment
      description: Deploy an application to selected provider(s) with automatic detection and optimization
      tags: [Deployments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeployRequest'
            examples:
              frontend:
                summary: Deploy Next.js frontend
                value:
                  name: my-nextjs-app
                  type: frontend
                  repository_id: repo_123
                  provider: vercel
                  env_vars:
                    NEXT_PUBLIC_API_URL: https://api.example.com
              fullstack:
                summary: Full-stack deployment
                value:
                  name: my-app
                  services:
                    - name: frontend
                      type: frontend
                      provider: vercel
                    - name: backend
                      type: backend
                      provider: render
                    - name: database
                      type: database
                      provider: supabase
              auto:
                summary: Auto-detect and deploy
                value:
                  name: my-app
                  repository_id: repo_123
                  provider: auto
      responses:
        '200':
          description: Deployment created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
        '429':
          description: Rate limit exceeded

  /terminate:
    post:
      summary: Terminate deployment
      description: Terminate a running deployment and clean up resources
      tags: [Deployments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                uuid:
                  type: string
                  description: Project UUID to terminate
      responses:
        '200':
          description: Deployment terminated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          description: Deployment not found
        '500':
          description: Failed to terminate deployment

  # Projects endpoints
  /projects:
    get:
      summary: List projects
      description: Get all projects for the authenticated user
      tags: [Projects]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, deploying, deployed, failed, terminated]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'

  /instances:
    get:
      summary: List instances
      description: Get all instances for the authenticated user
      tags: [Deployments]
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: List of instances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Instance'

  # GitHub integration
  /api/github/repositories:
    get:
      summary: List GitHub repositories
      description: Get all repositories accessible to the authenticated user
      tags: [Projects]
      responses:
        '200':
          description: List of repositories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Repository'

  /api/github/callback:
    get:
      summary: GitHub OAuth callback
      description: Handle GitHub OAuth callback
      tags: [Authentication]
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        '302':
          description: Redirect to application
        '400':
          description: Invalid callback

  # Detection endpoint
  /v1/detect:
    post:
      summary: Auto-detect application type
      description: Analyze repository files to detect application type, framework, and recommended deployment configuration
      tags: [Detection]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                repository_id:
                  type: string
                  description: Repository ID to analyze
                files:
                  type: array
                  items:
                    type: string
                  description: List of file paths to analyze
            examples:
              byRepo:
                summary: Detect by repository
                value:
                  repository_id: repo_123
              byFiles:
                summary: Detect by file list
                value:
                  files:
                    - package.json
                    - next.config.js
                    - app/page.tsx
      responses:
        '200':
          description: Detection result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionResult'
              examples:
                nextjs:
                  summary: Next.js application
                  value:
                    type: frontend
                    framework: nextjs
                    version: "14.0.0"
                    build_command: npm run build
                    start_command: npm start
                    recommended_providers:
                      - vercel
                      - render
                    dependencies:
                      - type: database
                        optional: true
                express:
                  summary: Express.js API
                  value:
                    type: backend
                    framework: express
                    runtime: nodejs
                    recommended_providers:
                      - render
                      - fly
                    required_services:
                      - database

  # Cost estimation
  /v1/estimate-cost:
    post:
      summary: Estimate deployment costs
      description: Calculate estimated monthly costs for a deployment across different providers
      tags: [Cost]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeployRequest'
      responses:
        '200':
          description: Cost estimate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostEstimate'
              examples:
                simple:
                  summary: Simple frontend
                  value:
                    total_monthly: 0
                    breakdown:
                      vercel:
                        monthly: 0
                        tier: hobby
                        includes:
                          bandwidth: 100GB
                          builds: 100
                    recommendations:
                      - Stay on free tier for hobby projects
                fullstack:
                  summary: Full-stack app
                  value:
                    total_monthly: 25
                    breakdown:
                      vercel:
                        monthly: 0
                        tier: hobby
                      render:
                        monthly: 7
                        tier: starter
                      supabase:
                        monthly: 0
                        tier: free
                      upstash:
                        monthly: 0
                        tier: free
                    warnings:
                      - Render free tier has limited hours
                      - Supabase has 500MB storage limit

  # User credentials
  /user/{id}/creds:
    get:
      summary: Get user credentials
      description: Retrieve cloud provider credentials for user
      tags: [Authentication]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkRequest'

    put:
      summary: Update user credentials
      description: Update cloud provider credentials
      tags: [Authentication]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkRequest'
      responses:
        '200':
          description: Credentials updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  # Link management
  /link:
    get:
      summary: Get provider links
      description: Get status of cloud provider connections
      tags: [Providers]
      responses:
        '200':
          description: Provider link status
          content:
            application/json:
              schema:
                type: object

    post:
      summary: Validate provider link
      description: Validate cloud provider credentials
      tags: [Providers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkRequest'
      responses:
        '200':
          description: Link validated
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  providers:
                    type: object

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /login endpoint

  schemas:
    # Authentication schemas
    SignupRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          description: Must contain at least one uppercase, lowercase, and number

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    User:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        instances:
          type: array
          items:
            $ref: '#/components/schemas/Instance'

    LinkRequest:
      type: object
      properties:
        aws_creds:
          type: object
          properties:
            access_key_id:
              type: string
            secret_access_key:
              type: string
        llm_config:
          type: object
          properties:
            provider:
              type: string
            providers:
              type: object
              additionalProperties:
                type: object
                properties:
                  modal:
                    type: string
                  api_key:
                    type: string
        portfolio:
          type: object
          properties:
            root_endpoint:
              type: string
            api_key:
              type: string
        git:
          type: object
          properties:
            access_token:
              type: string
            refresh_token:
              type: string
            token_expiry:
              type: string
              format: date-time

    # Deployment schemas
    DeployRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 50
          pattern: '^[a-z0-9-]+$'
        type:
          type: string
          enum: [frontend, backend, database, cache, storage, queue, fullstack]
        provider:
          type: string
          enum: [vercel, render, supabase, neon, upstash, fly, railway, byteport-host, auto]
          default: auto
        repository_id:
          type: string
          description: Repository ID to deploy from
        config:
          type: object
          description: Provider-specific configuration
        env_vars:
          type: object
          additionalProperties:
            type: string
          description: Environment variables for the deployment
        services:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
              provider:
                type: string
              config:
                type: object

    Deployment:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        name:
          type: string
        owner:
          type: string
          format: uuid
        project_uuid:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, deploying, deployed, failed, terminated]
        providers:
          type: object
          description: Provider-specific deployment information
        services:
          type: array
          items:
            $ref: '#/components/schemas/Service'
        cost_info:
          $ref: '#/components/schemas/CostInfo'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deployed_at:
          type: string
          format: date-time
        terminated_at:
          type: string
          format: date-time

    Project:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        id:
          type: string
        owner:
          type: string
          format: uuid
        name:
          type: string
        repository_id:
          type: string
        repository:
          $ref: '#/components/schemas/Repository'
        readme:
          type: string
        description:
          type: string
        last_updated:
          type: string
          format: date-time
        platform:
          type: string
        access_url:
          type: string
          format: uri
        type:
          type: string
        deployments:
          type: object

    Instance:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        owner:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
        res_uuid:
          type: string
        resources:
          type: array
          items:
            type: object

    Repository:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        full_name:
          type: string
        url:
          type: string
          format: uri
        private:
          type: boolean
        default_branch:
          type: string

    Service:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [frontend, backend, database, cache, storage, queue]
        provider:
          type: string
        url:
          type: string
          format: uri
        status:
          type: string
          enum: [pending, provisioning, running, failed, stopped]
        config:
          type: object
        metadata:
          type: object

    DetectionResult:
      type: object
      properties:
        type:
          type: string
          enum: [frontend, backend, database, cache, storage, queue, fullstack]
        framework:
          type: string
          description: Detected framework (e.g., nextjs, express, django)
        runtime:
          type: string
          description: Runtime environment (e.g., nodejs, python, go)
        version:
          type: string
          description: Framework/runtime version
        build_command:
          type: string
        start_command:
          type: string
        install_command:
          type: string
        recommended_providers:
          type: array
          items:
            type: string
        required_services:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              optional:
                type: boolean
        dependencies:
          type: object
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: Confidence score of detection

    CostEstimate:
      type: object
      properties:
        total_monthly:
          type: number
          description: Total estimated monthly cost in USD
        breakdown:
          type: object
          additionalProperties:
            type: object
            properties:
              monthly:
                type: number
              tier:
                type: string
              includes:
                type: object
              overages:
                type: object
        free_tier_usage:
          type: object
          description: Services using free tier
        recommendations:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        updated_at:
          type: string
          format: date-time

    CostInfo:
      type: object
      properties:
        monthly:
          type: number
        provider_costs:
          type: object
          additionalProperties:
            type: number
        free_tier_usage:
          type: object
        last_updated:
          type: string
          format: date-time

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Error type or code
        message:
          type: string
          description: Human-readable error message
        details:
          type: object
          description: Additional error details
        code:
          type: string
          description: Machine-readable error code

  examples:
    DeploymentPending:
      summary: Pending deployment
      value:
        uuid: d290f1ee-6c54-4b01-90e6-d701748f0851
        name: my-app
        status: pending
        services: []
        created_at: '2025-01-15T10:30:00Z'

    DeploymentActive:
      summary: Active deployment
      value:
        uuid: d290f1ee-6c54-4b01-90e6-d701748f0851
        name: my-app
        status: deployed
        services:
          - name: frontend
            type: frontend
            provider: vercel
            url: https://my-app.vercel.app
            status: running
          - name: database
            type: database
            provider: supabase
            status: running
        cost_info:
          monthly: 0
          free_tier_usage:
            vercel: true
            supabase: true
        deployed_at: '2025-01-15T10:35:00Z'
