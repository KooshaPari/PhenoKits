extends:
  - '@commitlint/config-conventional'
rules:
  type-enum:
    - 2
    - always
    - [feat, fix, docs, test, perf, refactor, chore, ci, build, style, revert]
  subject-case:
    - 2
    - never
    - [sentence-case, start-case, pascal-case, upper-case]
  header-max-length:
    - 2
    - always
    - 100
