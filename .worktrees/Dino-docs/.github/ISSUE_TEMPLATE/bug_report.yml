name: Bug Report
description: Report a bug in DINOForge
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Build with `dotnet build ...`
        2. Run ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: DINOForge Version
      description: Version or commit hash
      placeholder: "0.1.0 or commit abc1234"
    validations:
      required: false

  - type: input
    id: game-version
    attributes:
      label: DINO Game Version
      description: Steam build ID or version if known
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Runtime
        - SDK
        - PackCompiler
        - Warfare Domain
        - DumpTools
        - Schemas
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Stack Trace
      description: Paste any relevant logs or error output.
      render: text
    validations:
      required: false
