name: Performance Benchmarks

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    name: BenchmarkDotNet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
          global-json-file: global.json
          include-prerelease: true

      - name: Restore dependencies
        run: dotnet restore src/DINOForge.CI.NoRuntime.sln

      - name: Build dependencies (ordered)
        run: |
          for p in \
            src/SDK/DINOForge.SDK.csproj \
            src/Bridge/Protocol/DINOForge.Bridge.Protocol.csproj \
            src/Bridge/Client/DINOForge.Bridge.Client.csproj \
            src/Domains/Warfare/DINOForge.Domains.Warfare.csproj \
            src/Domains/Economy/DINOForge.Domains.Economy.csproj \
            src/Domains/Scenario/DINOForge.Domains.Scenario.csproj \
            src/Domains/UI/DINOForge.Domains.UI.csproj \
            src/Tools/Installer/InstallerLib/DINOForge.Tools.Installer.csproj; do
            dotnet build "$p" -c Release --no-restore --verbosity minimal || exit 1
          done
          dotnet build src/DINOForge.CI.NoRuntime.sln -c Release --no-restore /p:BuildInParallel=false

      - name: Run benchmarks
        run: |
          # Run benchmark project if it exists
          if [ -d "src/Tools/Benchmarks" ]; then
            dotnet run --project src/Tools/Benchmarks/DINOForge.Tools.Benchmarks.csproj -- --configuration Release
          else
            echo "Note: Benchmark project not yet created. Create src/Tools/Benchmarks/DINOForge.Tools.Benchmarks.csproj with BenchmarkDotNet v0.13.* and benchmarks for ContentLoader.LoadPacks"
          fi

      - name: Check performance regression
        run: |
          python3 - <<'PYEOF'
          import json, os, sys, glob

          # Find latest BenchmarkDotNet results JSON
          results_files = glob.glob("BenchmarkDotNet.Artifacts/results/**/*-report-full.json", recursive=True)
          if not results_files:
              print("No benchmark results found — skipping regression check")
              sys.exit(0)

          latest = {}
          for f in results_files:
              with open(f) as fp:
                  data = json.load(fp)
              for bench in data.get("Benchmarks", []):
                  name = bench.get("FullName", bench.get("Method", "unknown"))
                  mean_ns = bench.get("Statistics", {}).get("Mean", 0)
                  latest[name] = mean_ns

          # Load baseline if exists
          baseline_path = "docs/benchmarks/baseline.json"
          if not os.path.exists(baseline_path):
              print("No baseline found — saving current results as baseline")
              os.makedirs("docs/benchmarks", exist_ok=True)
              with open(baseline_path, "w") as f:
                  json.dump(latest, f, indent=2)
              sys.exit(0)

          with open(baseline_path) as f:
              baseline = json.load(f)

          regressions = []
          for name, mean_ns in latest.items():
              if name in baseline:
                  ratio = mean_ns / baseline[name]
                  if ratio > 1.10:  # >10% regression
                      regressions.append(f"{name}: {ratio:.1%} slower (was {baseline[name]:.0f}ns, now {mean_ns:.0f}ns)")

          if regressions:
              print("PERFORMANCE REGRESSIONS DETECTED:")
              for r in regressions:
                  print(f"  ❌ {r}")
              sys.exit(1)
          else:
              print(f"✅ No regressions detected across {len(latest)} benchmarks")

          # Save latest as new baseline if no regressions
          with open(baseline_path, "w") as f:
              json.dump(latest, f, indent=2)
          PYEOF

      - name: Save benchmark results to docs
        if: always()
        run: |
          mkdir -p docs/benchmarks
          cp BenchmarkDotNet.Artifacts/results/**/*-report-full.json docs/benchmarks/latest-raw.json 2>/dev/null || true
          echo '{"timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'", "status": "completed"}' > docs/benchmarks/latest.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: benchmark-results
          path: BenchmarkDotNet.Artifacts/
          retention-days: 90
