name: Mutation Testing

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Monday 6am UTC

permissions:
  contents: read

jobs:
  stryker:
    name: Stryker Mutation Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
          global-json-file: global.json
          include-prerelease: true

      - name: Restore dependencies
        run: dotnet restore src/DINOForge.CI.NoRuntime.sln

      - name: Build dependencies (ordered)
        run: |
          for p in \
            src/SDK/DINOForge.SDK.csproj \
            src/Bridge/Protocol/DINOForge.Bridge.Protocol.csproj \
            src/Bridge/Client/DINOForge.Bridge.Client.csproj \
            src/Domains/Warfare/DINOForge.Domains.Warfare.csproj \
            src/Domains/Economy/DINOForge.Domains.Economy.csproj \
            src/Domains/Scenario/DINOForge.Domains.Scenario.csproj \
            src/Domains/UI/DINOForge.Domains.UI.csproj \
            src/Tools/Installer/InstallerLib/DINOForge.Tools.Installer.csproj; do
            dotnet build "$p" -c Release --no-restore --verbosity minimal || exit 1
          done
          dotnet build src/DINOForge.CI.NoRuntime.sln -c Release --no-restore /p:BuildInParallel=false

      - name: Install Stryker.NET
        run: dotnet tool install -g dotnet-stryker

      - name: Run mutation tests on SDK
        run: dotnet stryker --project src/SDK/DINOForge.SDK.csproj

      - name: Export mutation score to docs
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, glob, os, datetime

          # Find Stryker mutation report
          reports = glob.glob("**/mutation-report.json", recursive=True) + glob.glob("**/StrykerOutput/**/mutation-report.json", recursive=True)

          summary = {
              "timestamp": datetime.datetime.utcnow().isoformat(),
              "mutation_score": 0,
              "killed": 0,
              "survived": 0,
              "timeout": 0,
              "total": 0
          }

          for report in reports[:1]:  # Take first found
              with open(report) as f:
                  data = json.load(f)
              # Stryker JSON format: files.*.mutants[].status
              killed = survived = timeout = 0
              for file_data in data.get("files", {}).values():
                  for mutant in file_data.get("mutants", []):
                      status = mutant.get("status", "")
                      if status == "Killed": killed += 1
                      elif status == "Survived": survived += 1
                      elif status == "Timeout": timeout += 1
              total = killed + survived + timeout
              score = round(killed / total * 100, 1) if total else 0
              summary.update({"mutation_score": score, "killed": killed, "survived": survived, "timeout": timeout, "total": total})

          os.makedirs("docs/mutation-score", exist_ok=True)
          with open("docs/mutation-score/latest.json", "w") as f:
              json.dump(summary, f, indent=2)
          print(f"Mutation score: {summary['mutation_score']}% ({summary['killed']}/{summary['total']} killed)")
          PYEOF

      - name: Upload mutation test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: mutation-test-results
          path: StrykerOutput/
          retention-days: 30
