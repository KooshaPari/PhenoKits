name: Policy Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  governance:
    runs-on: ubuntu-latest
    name: Governance Checks
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check CLAUDE.md exists
        run: |
          if [ ! -f CLAUDE.md ] || [ ! -s CLAUDE.md ]; then
            echo "::error::CLAUDE.md missing or empty — required by agent governance"
            exit 1
          fi
          echo "CLAUDE.md: OK"

      - name: Check CHANGELOG.md updated
        run: |
          # Skip for dependabot PRs (automated dependency bumps)
          # Use event.pull_request.user.login (stable across reruns) not github.actor
          if [ "${{ github.event.pull_request.user.login }}" = "dependabot[bot]" ]; then
            echo "CHANGELOG.md: skipped (dependabot PR)"
            exit 0
          fi
          # Skip for docs-only, CI-only, or lock-file-only PRs
          NON_DOCS=$(git diff --name-only origin/main...HEAD | grep -cv "^docs/\|^\.github/\|^\.claude/\|packages\.lock\.json$" || true)
          if [ "$NON_DOCS" -gt 0 ]; then
            if ! git diff --name-only origin/main...HEAD | grep -q "CHANGELOG.md"; then
              echo "::error::CHANGELOG.md was not updated. All non-docs changes must be documented."
              exit 1
            fi
          fi
          echo "CHANGELOG.md: OK"

      - name: Check formal governance assets
        run: |
          test -f .github/CODEOWNERS || { echo "::error::.github/CODEOWNERS is required"; exit 1; }
          test -f codecov.yml || { echo "::error::codecov.yml is required"; exit 1; }
          test -f RELEASING.md || { echo "::error::RELEASING.md is required"; exit 1; }
          echo "Formal governance assets: OK"

      - name: Check SemVer and changelog contract
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "::error::VERSION must contain a valid Semantic Version (found: $VERSION)"
            exit 1
          fi

          if ! grep -q '^## \[Unreleased\]$' CHANGELOG.md; then
            echo "::error::CHANGELOG.md must contain an [Unreleased] section"
            exit 1
          fi

          RELEASE_HEADER=$(grep -E '^## \[[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$' CHANGELOG.md | head -1 || true)
          if [ -z "$RELEASE_HEADER" ]; then
            echo "::error::CHANGELOG.md must contain at least one released version heading in Keep a Changelog format"
            exit 1
          fi

          RELEASE_VERSION=$(echo "$RELEASE_HEADER" | grep -oE '\[[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?\]' | tr -d '[]')
          if [ "$RELEASE_VERSION" != "$VERSION" ]; then
            echo "::error::VERSION ($VERSION) must match the latest released changelog section ($RELEASE_VERSION)"
            exit 1
          fi

          echo "SemVer and changelog contract: OK ($VERSION)"

      - name: Check public types have XML doc comments
        run: |
          # Find public classes/interfaces/structs/records missing /// summary
          VIOLATIONS=0
          while IFS= read -r file; do
            # Get line numbers of public type declarations
            grep -n "^\s*public\s\+\(class\|interface\|struct\|record\|enum\)" "$file" | while IFS=: read -r line_num line_content; do
              # Check if the line above has a /// comment
              prev_line=$((line_num - 1))
              if [ "$prev_line" -gt 0 ]; then
                prev=$(sed -n "${prev_line}p" "$file")
                if ! echo "$prev" | grep -q "///"; then
                  echo "::warning file=$file,line=$line_num::Missing XML doc comment: $line_content"
                  VIOLATIONS=$((VIOLATIONS + 1))
                fi
              fi
            done
          done < <(find src/ -name "*.cs" -not -path "*/obj/*" -not -path "*/bin/*")
          if [ "$VIOLATIONS" -gt 5 ]; then
            echo "::error::Too many public types without XML doc comments ($VIOLATIONS). Add /// <summary> comments."
            exit 1
          fi
          echo "XML doc comments: OK (violations: $VIOLATIONS)"

      - name: Check conventional commit format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Skip for dependabot PRs (titles are auto-generated)
          if [ "${{ github.event.pull_request.user.login }}" = "dependabot[bot]" ]; then
            echo "Conventional commit title: skipped (dependabot PR)"
            exit 0
          fi
          # Verify PR title follows conventional commits
          if ! printf '%s\n' "$PR_TITLE" | grep -qE "^(feat|fix|docs|test|perf|refactor|chore|ci|build|style|revert)(\(.+\))?!?: .+"; then
            echo "::error::PR title must follow conventional commits format: type(scope): description"
            exit 1
          fi
          echo "Conventional commit title: OK"

      - name: Check test count minimum
        run: |
          # Count total test methods in test files
          TEST_COUNT=$(find src/Tests -name "*Tests.cs" -not -path "*/obj/*" -not -path "*/bin/*" -exec grep -h "public async Task\|public void\|public Task\|\[Fact\]\|\[Theory\]" {} \; | grep -c "public\|Fact\|Theory" || true)
          MINIMUM_TESTS=350
          if [ "$TEST_COUNT" -lt "$MINIMUM_TESTS" ]; then
            echo "::error::Test count ($TEST_COUNT) is below minimum ($MINIMUM_TESTS). Add more tests."
            exit 1
          fi
          echo "Test count check: OK ($TEST_COUNT >= $MINIMUM_TESTS)"

      - name: Summary
        if: success()
        run: echo "All governance checks passed"
