name: Generate SBOM

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

jobs:
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5 
        with:
          global-json-file: global.json

      - name: Install CycloneDX tool
        run: dotnet tool install --global CycloneDX

      - name: Restore dependencies
        run: dotnet restore src/DINOForge.CI.NoRuntime.sln

      - name: Generate SBOM for SDK
        run: |
          dotnet CycloneDX src/SDK/DINOForge.SDK.csproj \
            --output . \
            --filename sbom-sdk \
            --json

      - name: Generate SBOM for Bridge Protocol
        run: |
          dotnet CycloneDX src/Bridge/Protocol/DINOForge.Bridge.Protocol.csproj \
            --output . \
            --filename sbom-bridge-protocol \
            --json

      - name: Upload SBOMs as artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom-files
          path: |
            sbom-sdk.json
            sbom-bridge-protocol.json
          retention-days: 90

      - name: Attach SBOM to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$RELEASE_TAG" sbom-sdk.json sbom-bridge-protocol.json --clobber
