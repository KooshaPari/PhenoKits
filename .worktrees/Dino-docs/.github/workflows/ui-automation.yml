name: UI Automation (Desktop Companion)

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 04:00 UTC
    - cron: "0 4 * * 1"

permissions: {}

jobs:
  companion-ui-automation:
    name: Companion UI Automation (FlaUI)
    runs-on: windows-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 11.0.x
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Restore & build DesktopCompanion
        run: |
          dotnet restore src/Tools/DesktopCompanion/DesktopCompanion.csproj
          dotnet build src/Tools/DesktopCompanion/DesktopCompanion.csproj `
            --configuration Release --no-restore

      - name: Restore & build UI Automation tests
        run: |
          dotnet restore src/Tests/UiAutomation/DINOForge.Tests.UiAutomation.csproj
          dotnet build src/Tests/UiAutomation/DINOForge.Tests.UiAutomation.csproj `
            --configuration Release --no-restore

      - name: Run UI Automation tests
        env:
          COMPANION_EXE: ${{ github.workspace }}\src\Tools\DesktopCompanion\bin\Release\net11.0-windows10.0.26100.0\DINOForge.DesktopCompanion.exe
        run: |
          dotnet test src/Tests/UiAutomation/DINOForge.Tests.UiAutomation.csproj `
            --configuration Release `
            --no-build `
            --filter "Category=UiAutomation" `
            --logger "trx;LogFileName=ui-automation-results.trx" `
            --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        if: always()
        with:
          name: ui-automation-results
          path: ./test-results/*.trx
          retention-days: 14

      - name: Publish test report
        uses: dorny/test-reporter@2dcf091ad558da2cabf16f6b423e02cd078c937a
        if: always()
        with:
          name: UI Automation Tests
          path: ./test-results/*.trx
          reporter: dotnet-trx
