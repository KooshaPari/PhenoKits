name: Version Bump (Conventional Commits)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no commits or tags)'
        type: boolean
        default: false

permissions: {}

jobs:
  version-bump:
    name: Bump Version
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Install Versionize
        run: dotnet tool install --global Versionize

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Versionize (dry run)
        if: inputs.dry_run == true
        run: versionize --dry-run --workingDirectory .

      - name: Run Versionize
        if: inputs.dry_run != true
        run: versionize --workingDirectory . --tag-only

      - name: Validate SemVer and changelog governance
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "VERSION must contain valid SemVer (found: $VERSION)" >&2
            exit 1
          fi
          if ! grep -q '^## \[Unreleased\]$' CHANGELOG.md; then
            echo "CHANGELOG.md must retain an [Unreleased] section" >&2
            exit 1
          fi

          RELEASE_HEADER=$(grep -E '^## \[[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$' CHANGELOG.md | head -1 || true)
          if [ -z "$RELEASE_HEADER" ]; then
            echo "CHANGELOG.md must contain at least one released version heading in Keep a Changelog format" >&2
            exit 1
          fi

          RELEASE_VERSION=$(echo "$RELEASE_HEADER" | grep -oE '\[[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?\]' | tr -d '[]')
          if [ "$RELEASE_VERSION" != "$VERSION" ]; then
            echo "VERSION ($VERSION) must match the latest released changelog section ($RELEASE_VERSION)" >&2
            exit 1
          fi

          echo "Version governance: OK ($VERSION)"

      - name: Push changes and tags
        if: inputs.dry_run != true
        run: |
          git push --follow-tags origin main
