exclude: |
  (?x)^(
    packs/.*\.(fbx|FBX|png|PNG|meta|prefab|mat|asset|unity|tga|jpg|jpeg|gif|bmp|psd|wav|mp3|ogg|ttf|otf|dll|exe|bin|zip|7z|tar|gz|obj|OBJ|mtl|MTL|dae|DAE|plist)$|
    unity-assetbundle-builder/.*|
    .*\.(fbx|FBX|meta|prefab|mat|asset|unity|obj|OBJ|mtl|MTL|dae|DAE)$|
    solution-build-parallel\.log$
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: \.(fbx|FBX|png|PNG|meta|prefab|mat|asset|unity|tga|jpg|jpeg|wav|mp3|ogg|ttf|otf|dll|exe|bin|obj|OBJ|mtl|MTL|dae|DAE|plist)$
      - id: end-of-file-fixer
        exclude: \.(fbx|FBX|png|PNG|meta|prefab|mat|asset|unity|tga|jpg|jpeg|wav|mp3|ogg|ttf|otf|dll|exe|bin|json|obj|OBJ|mtl|MTL|dae|DAE|plist)$
      - id: check-yaml
        exclude: (src/Tests/FuzzCorpus/|docs/sessions/|docs/archive/|packs/_archived/)
      - id: check-json
        exclude: (packs/.*/assets/raw/.*asset_manifest\.json|src/Tests/FuzzCorpus/)
      - id: check-merge-conflict
        exclude: (src/Tests/FuzzCorpus/|docs/sessions/|docs/archive/|\\.log$|\\.xml$|scripts/game/|scripts/unity/|scripts/install-companion)
      - id: check-added-large-files
        args: [--maxkb=500]
        exclude: (docs/proof-of-features/.*\.mp4|coverage/|packs/.*\.zip$)

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yaml, --no-warnings]
        exclude: (src/Tests/FuzzCorpus/|docs/sessions/|docs/archive/|packs/_archived/)

  - repo: local
    hooks:
      - id: dotnet-format
        name: dotnet format
        entry: dotnet format src/DINOForge.CI.NoRuntime.sln --verify-no-changes
        language: system
        pass_filenames: false
        types: [c#]

      - id: dotnet-test-all
        name: dotnet test (unit + integration)
        entry: pwsh -File scripts/test-local.ps1
        language: system
        pass_filenames: false
        stages: [pre-push]
