codecov:
  notify:
    wait_for_ci: true

coverage:
  precision: 1
  round: down
  range: "60...90"
  status:
    project:
      default:
        target: auto
        threshold: 1%
        if_ci_failed: error
        if_not_found: failure
    patch:
      default:
        target: 70%
        threshold: 5%
        if_ci_failed: error
        if_not_found: failure

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true
  require_base: false
  require_head: true

flags:
  ci:
    paths:
      - src/

ignore:
  - docs/**
  - packs/**
  - schemas/**
  - "**/*.g.cs"
  - "**/*.Designer.cs"
