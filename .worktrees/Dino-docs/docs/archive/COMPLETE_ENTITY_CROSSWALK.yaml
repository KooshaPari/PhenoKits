# ==============================================================================
# ECS SYSTEMS - Simulation & Processing
# ==============================================================================

ecs_systems:
  system_groups:
    - name: Initialization
      order: 0
      description: Setup and initialization phase
      systems:
        - EntityInitializationSystem
        - ComponentSetupSystem
      status: ✓ mapped

    - name: Simulation
      order: 1
      description: Core game simulation loop
      systems:
        - UnitBehaviorSystem
        - StatModifierSystem (DINOForge)
        - AttackSystem
      status: ✓ mapped

    - name: PathFinding
      order: 2
      description: Unit pathfinding and movement calculation
      systems:
        - PathFindingSystem
        - MovementSystem
      status: ✓ mapped

    - name: Fight
      order: 3
      description: Combat resolution and damage application
      systems:
        - DamageSystem
        - ProjectileSystem
        - CombatResolutionSystem
      status: ✓ mapped

    - name: ResourceDelivery
      order: 4
      description: Resource distribution and gathering
      systems:
        - ResourceDeliverySystem
        - GatheringSystem
      status: ✓ mapped

    - name: ResourceProducing
      order: 5
      description: Resource production and generation
      systems:
        - FarmProductionSystem
        - MineProductionSystem
        - HarvestSystem
      status: ✓ mapped

    - name: Presentation
      order: 6
      description: Rendering and visual updates
      systems:
        - RenderingSystem
        - AnimationSystem
        - EffectsSystem
      status: ✓ mapped

  dinofrogeecs_additions:
    - name: StatModifierSystem
      namespace: DINOForge.Runtime.Bridge
      description: Applies field-level stat overrides from packs (doctrines, skills, etc.)
      system_type: SystemBase
      update_group: Simulation
      input_components: [Unit, StatOverride, Health, ArmorData, MoveHeading, AttackCooldown]
      output_components: [Health, ArmorData, MoveHeading, AttackCooldown]
      status: ✓ complete

    - name: AssetSwapSystem (skeleton)
      namespace: DINOForge.Runtime.Bridge
      description: Injects asset replacements (textures, meshes, audio) at runtime
      system_type: SystemBase
      update_group: Presentation
      note: Pending AssetsTools.NET integration for AddressablesCatalog
      status: ⚠ partial

