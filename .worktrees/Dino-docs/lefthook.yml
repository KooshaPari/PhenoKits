# lefthook.yml — DINOForge git hook configuration
# https://github.com/evilmartians/lefthook
#
# STASH POLICY: no stage_fixed anywhere — lefthook NEVER stashes unstaged changes.
# Hooks always run against the full working tree as-is.
#
# Bypass all hooks:      LEFTHOOK=0 git commit
# Skip specific command: LEFTHOOK_EXCLUDE=format-check git commit
# Run manually:          lefthook run pre-commit
#                        lefthook run pre-push

min_version: 2.0.0

pre-commit:
  parallel: true
  commands:
    format-check:
      glob: "**/*.cs"
      run: dotnet format src/DINOForge.CI.NoRuntime.sln --verify-no-changes

    check-yaml:
      glob: "**/*.{yaml,yml}"
      run: python3 scripts/hooks/check-yaml.py

    check-json:
      glob: "**/*.json"
      run: python3 scripts/hooks/check-json.py

    check-merge-conflicts:
      run: python3 scripts/hooks/check-merge-conflicts.py

pre-push:
  parallel: false
  commands:
    build:
      priority: 1
      run: dotnet build src/DINOForge.CI.NoRuntime.sln -c Release --verbosity minimal

    test-unit:
      priority: 2
      run: dotnet test src/Tests/DINOForge.Tests.csproj -c Release --no-build --verbosity normal

    test-integration:
      priority: 3
      run: dotnet test src/Tests/Integration/DINOForge.Tests.Integration.csproj -c Release --no-build --verbosity normal
