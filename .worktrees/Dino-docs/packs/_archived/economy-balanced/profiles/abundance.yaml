# Abundance Economy Profile
# Boosted production profile for factions that prioritize economic output.
# Higher starting resources and production multipliers at the cost of
# increased consumption and slightly worse trade rates.

id: economy-abundance
display_name: Abundance Economy
description: >
  An economy profile focused on high production output. Factions using this
  profile start with generous resource stockpiles and enjoy boosted production
  rates across all resource types. However, consumption rates are also elevated
  to reflect the larger workforce and infrastructure required. Trade rates are
  slightly worse, encouraging self-sufficiency over trade dependency.
  Best suited for factions that expand aggressively and need rapid resource
  generation to fuel military buildup.

starting_resources:
  food: 400
  wood: 300
  stone: 200
  iron: 100
  gold: 25

production_multipliers:
  food: 1.5
  wood: 1.4
  stone: 1.3
  iron: 1.2
  gold: 1.0

consumption_multipliers:
  food: 1.2
  wood: 1.1
  stone: 1.1
  iron: 1.0
  gold: 1.0

trade_rate_modifier: 1.15
trade_cooldown_modifier: 1.0
storage_multiplier: 1.5
building_cost_modifier: 0.9
worker_efficiency: 1.2
