  anti_armor: guer_brute
  support_weapon: guer_sapper
  recon: guer_tracker
  light_vehicle: guer_horseback_raider
  heavy_vehicle: guer_snare_layer
  artillery: guer_sapper
  hero_commander: guer_warchief
  spike_unit: guer_berserker

buildings:
  barracks: guer_war_lodge
  workshop: guer_forge
