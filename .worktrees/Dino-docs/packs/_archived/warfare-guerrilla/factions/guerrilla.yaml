  display_name: Guerrilla Warband
  description: A fierce guerrilla force relying on strong individual fighters, ambush tactics, and unconventional warfare. Each warrior is deadly but expensive to recruit.
  theme: fantasy
  archetype: asymmetric
  doctrine: ambush_warfare

