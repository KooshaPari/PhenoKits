# Guerrilla Warfare Pack
# Asymmetric archetype showcase - strong individuals, expensive, ambush tactics

id: warfare-guerrilla
name: Guerrilla Warfare
version: 0.1.0
framework_version: ">=0.1.0"
author: DINOForge
description: |
  An asymmetric warfare showcase featuring a fierce guerrilla force with strong individual warriors, ambush tactics, and resource efficiency. A single faction plays with lower unit caps but higher per-unit lethality.

  Faction included:
  - Guerrilla Warband: fanatical asymmetric archetype with experienced fighters, ambush doctrine, and unconventional economy (gather bonus +10%, higher upkeep costs)

  Content features:
  - 13 units: partisans, fighters, veteran fighters, brutes, sappers, trackers, horseback raiders, snare layers, and warchief commander
  - 10 buildings: war lodges, forges, sapper camps, lookout posts, spike pits, chieftain halls, hunting grounds, herb gardens, elders circles, palisades
  - 3 doctrines: ambush warfare, blood rage, forest stalker
  - Specialized gear and weapons favoring melee and unconventional tactics
  - Wave templates emphasizing hit-and-run assaults

  Ideal for learning asymmetric balance design and testing unconventional faction archetypes.
type: total_conversion

depends_on: []
conflicts_with: []

