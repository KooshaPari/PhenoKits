  faction_archetype: industrial_swarm
  modifiers:
    damage: 1.2
    aoe_radius: 1.3
    accuracy: 0.85
    speed: 1.1

- id: guerrilla_defense
  display_name: Guerrilla Defense
  description: Hit-and-run defensive doctrine exploiting mobility and concealment.
  faction_archetype: industrial_swarm
  modifiers:
    speed: 1.2
    range: 1.1
    armor: 0.8
    accuracy: 1.1
