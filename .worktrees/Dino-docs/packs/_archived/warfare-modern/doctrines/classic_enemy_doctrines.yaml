# Classic Enemy Doctrines

- id: human_wave
  display_name: Human Wave
  description: Overwhelm through sheer numbers. Units are cheap and expendable, produced at extreme rates.
  faction_archetype: industrial_swarm
  modifiers:
    spawn_rate: 1.5
    cost: 0.75
    morale: 0.8
    hp: 0.9

- id: scorched_earth
  display_name: Scorched Earth
