# Modern Warfare Pack
# West vs Classic Enemy - modern military themed total conversion

id: warfare-modern
name: Modern Warfare
version: 0.1.0
framework_version: ">=0.1.0"
author: DINOForge
description: |
  A total conversion replacing DINO's fantasy armies with contemporary military forces. Deploy modern infantry, vehicles, and artillery in asymmetric warfare between NATO-inspired Western Alliance and a technologically-advanced adversary.

  Factions included:
  - Western Alliance: disciplined combined-arms force with strong research and defensive infrastructure
  - Classic Enemy: adaptive force employing human-wave tactics and scorched-earth doctrine

  Content features:
  - 26 unique units: riflemen, squads, special forces, gunners, mortars, scouts, APCs, armor, drone operators
  - 21 buildings: barracks, armories, artillery depots, watchtowers, bunkers, command posts, supply depots, refineries, labs, walls
  - 6 doctrines: combined arms, blitzkrieg, fortified defense, human wave, scorched earth, guerrilla defense
  - 1 weapon set: modern firearms and munitions
  - Strategic wave templates for campaign play

  Gameplay shifts from medieval pacing to tactical modern warfare with emphasis on combined-arms coordination and technological advantage.
type: total_conversion

