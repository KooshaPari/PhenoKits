id: economy-abundance
display_name: Abundance Economy
description: |
  A boosted economy profile for aggressive expansion and fast-paced gameplay.
  Higher production rates and starting resources, reduced building costs, and
  improved worker efficiency. Trade rates are slightly more favorable.
  Recommended for experienced players seeking economic dominance.

