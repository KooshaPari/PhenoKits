  iron: 1.2
  gold: 1.0

consumption_multipliers:
  food: 1.2
  wood: 1.1
  stone: 1.1
  iron: 1.0
  gold: 1.0

trade_rate_modifier: 0.85
trade_cooldown_modifier: 0.8
storage_multiplier: 1.5
building_cost_modifier: 0.9
worker_efficiency: 1.2
