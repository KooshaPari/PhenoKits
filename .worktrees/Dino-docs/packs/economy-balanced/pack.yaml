# Economy Balanced Pack
# Provides standard and boosted economy profiles with basic trade routes

id: economy-balanced
name: Economy Balanced
version: 0.1.0
framework_version: ">=0.1.0"
author: DINOForge Team
type: balance
description: |
  Defines resource types, economy profiles, and trade routes for the DINOForge economy system.
  Does NOT change vanilla DINO's default economy; this pack layers on top of it.

  Standard profile (economy-standard): all multipliers at 1.0x — a reference baseline
  matching default game rates. Starting resources: 200 food, 150 wood, 100 stone, 50 iron,
  0 gold. Useful as a no-change anchor when combining multiple economy packs.

  Abundance profile (economy-abundance): boosted output for aggressive expansion.
  Production: food +50%, wood +40%, stone +30%, iron +20%. Consumption: food +20%,
  wood/stone +10%. Starting resources doubled (400 food, 300 wood, 200 stone, 100 iron,
  25 gold). Storage +50%, building costs -10%, worker efficiency +20%. Trade rates +15%.

  Trade routes (8 total): 4 resource-to-gold exports (wood 10:1, food 12:1, stone 8:1,
  iron 5:1), 1 gold-to-iron import (2:1), and 3 cross-resource swaps (wood→stone 1.5:1,
  food→wood 1.2:1, stone→iron 2.5:1). All routes have per-transaction caps and cooldowns.
  These rates are pack-defined, not vanilla values.

depends_on: []
conflicts_with: []

loads:
  resources:
    - resources/food.yaml
    - resources/wood.yaml
    - resources/stone.yaml
    - resources/iron.yaml
    - resources/gold.yaml
  economy_profiles:
    - economy_profiles/standard.yaml
    - economy_profiles/abundance.yaml
  trade_routes:
    - trade_routes/standard_routes.yaml
