# Vanilla DINO Reference Pack
# Canonical reference pack containing all vanilla DINO units, factions, buildings, weapons, and doctrines.

id: vanilla-dino
name: Vanilla DINO
version: 1.0.0
framework_version: ">=0.1.0"
author: DINOForge Team
type: content
description: |
  Canonical reference pack containing all 100+ vanilla DINO units, 6 factions, buildings,
  weapons, and doctrines. Use this as the base for all mod unit/faction mappings.

depends_on: []
conflicts_with: []
load_order: 10

loads:
  units:
    - units/lords-troops-units.yaml
    - units/rebels-units.yaml
    - units/royal-army-units.yaml
    - units/sarranga-units.yaml
    - units/undead-units.yaml
    - units/bugs-units.yaml

  factions:
    - factions/lords-troops.yaml
    - factions/rebels.yaml
    - factions/royal-army.yaml
    - factions/sarranga.yaml
    - factions/undead.yaml
    - factions/bugs.yaml

  buildings:
    - buildings/lords-troops-buildings.yaml
    - buildings/rebels-buildings.yaml
    - buildings/royal-army-buildings.yaml
    - buildings/sarranga-buildings.yaml
    - buildings/undead-buildings.yaml
    - buildings/bugs-buildings.yaml
    - buildings/economy-buildings.yaml

  weapons:
    - weapons/vanilla-weapons.yaml

  doctrines:
    - doctrines/vanilla-doctrines.yaml
