# Airfield Buildings for Vanilla DINO
# Infrastructure for deploying and maintaining aerial units

# Tier 1 - Basic Airfield

- id: aviary
  display_name: Aviary
  description: Basic aerial unit training structure. Can produce tier 1 flying units.
  building_type: Production
  cost:
    food: 0
    wood: 150
    stone: 50
    iron: 20
    gold: 30
  health: 500
  production:
    aerial_recon_scout: 1

- id: wyvern_roost
  display_name: Wyvern Roost
  description: Beast lair for training wyverns and harpies. Unlocks tier 2 aerial units.
