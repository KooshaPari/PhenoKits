# Modern Warfare Doctrines

- id: combined_arms
  display_name: Combined Arms
  description: Integrate infantry, armor, and artillery for maximum effectiveness. This doctrine emphasizes coordinated tactics and mutual support between unit types.
  faction_archetype: order
  modifiers:
    vehicle_damage: 1.1
    infantry_damage: 1.05
    artillery_range: 1.1

- id: human_wave
  display_name: Human Wave
  description: Accept casualties in exchange for numerical superiority and relentless pressure. Maximize production at the cost of individual unit quality.
  faction_archetype: asymmetric
  modifiers:
    unit_cap_bonus: 0.4
    spawn_rate_bonus: 0.3
    morale_recovery: 1.15

- id: fortified_defense
  display_name: Fortified Defense
  description: Emphasis on defensive positions and static weapons. Turn the battlefield into a fortress.
  faction_archetype: order
  modifiers:
    defensive_building_armor: 1.25
    building_health: 1.15
    wall_effectiveness: 1.3

- id: asymmetric_tactics
  display_name: Asymmetric Tactics
  description: Mobile strikes and evasion over direct confrontation. Use superior speed and tactical flexibility.
  faction_archetype: asymmetric
  modifiers:
    scout_speed: 1.25
    light_vehicle_speed: 1.2
    evasion_chance: 0.15
