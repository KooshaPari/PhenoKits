# Modern Warfare Campaign Waves

- id: wave_01_scout_probe
  display_name: Scout Probe
  description: Initial reconnaissance - light scouts testing defenses.
  wave_number: 1
  delay_seconds: 20
  is_final_wave: false
  spawn_groups:
    - unit_id: mod-enemy-scout
      count: 4
      spawn_delay: 0.5

- id: wave_02_infantry_assault
  display_name: Infantry Assault
  description: Main assault with waves of soldiers and militia. Relentless pressure.
  wave_number: 2
  delay_seconds: 90
  is_final_wave: false
  spawn_groups:
    - unit_id: mod-enemy-militia
      count: 14
      spawn_delay: 0.3
    - unit_id: mod-enemy-soldier
      count: 10
      spawn_delay: 0.4
    - unit_id: mod-enemy-rpg-team
      count: 4
      spawn_delay: 1.0

- id: wave_03_armor_support
  display_name: Armor Support
  description: Armored vehicles with combined infantry for breakthrough tactics.
  wave_number: 3
  delay_seconds: 150
  is_final_wave: false
  spawn_groups:
    - unit_id: mod-enemy-soldier
      count: 8
      spawn_delay: 0.3
    - unit_id: mod-enemy-technical
      count: 6
      spawn_delay: 0.8
    - unit_id: mod-enemy-armor
      count: 4
      spawn_delay: 1.2

- id: wave_04_final_assault
  display_name: Final Assault
  description: Full commitment - everything converges at once. The enemy pushes all chips in.
  wave_number: 4
  delay_seconds: 180
  is_final_wave: true
  spawn_groups:
    - unit_id: mod-enemy-militia
      count: 18
      spawn_delay: 0.2
    - unit_id: mod-enemy-soldier
      count: 12
      spawn_delay: 0.3
    - unit_id: mod-enemy-armor
      count: 6
      spawn_delay: 0.8
    - unit_id: mod-enemy-mortar
      count: 3
      spawn_delay: 1.0
    - unit_id: mod-enemy-leader
      count: 1
      spawn_delay: 0
  difficulty_scaling:
    count_multiplier: 1.0
    health_multiplier: 1.2
    damage_multiplier: 1.15
