# Import Notes
import_instructions:
  - Models are in GLB/FBX format from Sketchfab
  - Use Unity 2021.3.45f2 with FBX Importer plugin
  - Set import settings: Rig=None, Materials=Standard URP, Scale=1.0
  - Create prefabs with LOD0 (full), LOD1 (60% verts), LOD2 (30% verts)
  - Add to Addressables catalog: "sw-{unit_id}-model"
  - Reference in ContentLoader for spawning
