# CIS Faction — Vanilla DINO Building Reskin Crosswalk
# Maps every vanilla DINO building type to its CIS Star Wars replacement.
# Used by AssetSwapRegistry at pack load time.
# Source: VanillaCatalog.InferBuildingType() — all 13 vanilla types covered.

schema_version: "1.0"
pack_id: warfare-starwars
faction: cis

swaps:
  - vanilla_id: house
    swap_id: cis_house_droid_pod
    display_name: Droid Storage Pod
    description: >
      Stacked droid deactivation rack structure. Dark grey / rust-orange palette with
      organic curves and droid silhouettes visible inside. CIS techno-organic aesthetic.
    target_prefab: buildings/cis_house_droid_pod.prefab
    target_texture: textures/cis_house_droid_pod_albedo.png
    source_base: source/kenney/sci-fi-rts/Models/structure-C.obj
    source_license: CC0
    effort_hours: 2
    status: placeholder

