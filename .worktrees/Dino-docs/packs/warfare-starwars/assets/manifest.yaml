  - id: cis_b1_battle_droid
    display_name: B1 Battle Droid
    type: Prefab
    placeholder: true
    description: >
      Iconic thin stick-figure droid (~250 tris). Elongated narrow head (oval shape), spindly arms and
      legs, no body mass - ribbed torso barely wider than arms. Carries E-5 blaster (boxy rectangular
      rifle). Tan/sandy beige color. TABS-exaggerated: absurdly thin limbs, slightly top-heavy head.
      Perfect for swarm quantities.
    meshes:
      - id: cis_b1_mesh
        type: Mesh
        file: meshes/cis_b1_battle_droid.fbx
        poly_budget: 250
        placeholder: true
        source_file: source/opengameart/sci-fi-soldier/sci-fi-soldiers.zip
        license: CC0
        source_hint: >
          BASE: source/opengameart/sci-fi-soldier/sci-fi-soldiers.zip (CC0) — extract and use as body reference.
          Alt base: source/kenney/mini-characters-1 character-male-a.fbx (CC0).
          Modifications: replace head with triangular CIS droid head, thin all limbs to stick-figure proportions,
          remove organic details, add E-5 blaster from source/kenney/blaster-kit blaster-e.fbx.
      - id: cis_b1_texture
        type: Texture
        file: textures/cis_b1_battle_droid_albedo.png
        placeholder: true
        source_hint: Tan (#C8A87A) base, dark brown (#5C3D1E) joint recesses, red photoreceptor dot.

