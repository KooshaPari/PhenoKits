# warfare-starwars Asset Manifest
# Art style: low-poly TABS aesthetic (see ASSET_PIPELINE.md)
# Source assets downloaded to source/ — see source/SOURCES.md for full index
# Placeholders still require Blender assembly from source files listed below

schema_version: "1.0"
pack_id: warfare-starwars

# =============================================================================
# REPUBLIC UNITS
# =============================================================================

units:
  - id: rep_clone_militia
    display_name: Clone Militia
    type: Prefab
    placeholder: true
    description: >
      Low-poly humanoid figure (~300 tris). Compact Phase I clone trooper silhouette: round helmet dome,
      flat chest plate panels, short barrel carbine held at hip. White armor with no markings. Exaggerated
      wide stance and stubby limbs in TABS style.
    meshes:
      - id: rep_clone_militia_mesh
        type: Mesh
        file: meshes/rep_clone_militia.fbx
        poly_budget: 300
        placeholder: true
        source_file: source/kenney/mini-characters-1/Models/FBX format/character-male-a.fbx
        license: CC0
        source_hint: >
          BASE: source/kenney/mini-characters-1 character-male-a.fbx (CC0, Kenney.nl).
          Modifications needed: add dome helmet, chest plates, arm vambraces, short carbine
          (use source/kenney/blaster-kit blaster-b.fbx). TABS-style exaggeration of proportions.
      - id: rep_clone_militia_texture
        type: Texture
        file: textures/rep_clone_militia_albedo.png
        placeholder: true
        license: CC0
        source_hint: >
          Derive from source/kenney/mini-characters-1/Models/Textures/ atlas (CC0).
          Repaint: flat white (#F5F5F5) base with blue (#1A3A6B) stripe accent.

  - id: rep_clone_trooper
    display_name: Clone Trooper
    type: Prefab
    placeholder: true
    description: >
      Standard low-poly Phase II clone trooper (~350 tris). Slightly taller and more armored than militia.
      Iconic T-visor helmet, shoulder pauldrons, forearm vambraces. White body with blue squad markings.
      Holds DC-15A blaster rifle (long barrel, two-handed grip). TABS-style chunky proportions.
    meshes:
      - id: rep_clone_trooper_mesh
        type: Mesh
        file: meshes/rep_clone_trooper.fbx
        poly_budget: 350
        placeholder: true
        source_file: source/kenney/mini-characters-1/Models/FBX format/character-male-b.fbx
        license: CC0
        source_hint: >
          BASE: source/kenney/mini-characters-1 character-male-b.fbx (CC0, Kenney.nl).
          Rifle: source/kenney/blaster-kit blaster-a.fbx (CC0).
          Modifications: T-visor helmet dome, shoulder pauldrons, forearm vambraces in Blender.
      - id: rep_clone_trooper_texture
        type: Texture
        file: textures/rep_clone_trooper_albedo.png
        placeholder: true
        source_hint: White (#FFFFFF) armor, blue (#1A3A6B) squad stripe, dark visor (#111111).

