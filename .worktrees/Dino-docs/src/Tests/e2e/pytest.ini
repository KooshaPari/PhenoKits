[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    e2e: end-to-end integration tests (require running game)
    vlm: vision language model tests (require ANTHROPIC_API_KEY)
    slow: slow-running tests (>5s)

addopts =
    -v
    --tb=short
    --strict-markers

asyncio_mode = auto
