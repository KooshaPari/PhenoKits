[project]
name = "dinoforge-mcp"
version = "0.1.0"
description = "FastMCP 3.x server for DINOForge – asset pipeline, game automation, catalog tools"
requires-python = ">=3.10"
dependencies = [
    "fastmcp>=3.0.0",
    "pydantic>=2.0.0",
    "python-dotenv>=1.0.0",
]

[project.scripts]
dinoforge-mcp = "dinoforge_mcp.server:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio"]
