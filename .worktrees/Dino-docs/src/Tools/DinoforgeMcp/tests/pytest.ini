[pytest]
# Pytest configuration for DINOForge MCP server tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    -ra
    --junit-xml=test-results.xml
    --cov=dinoforge_mcp
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=json:coverage.json

# Markers for test categorization
markers =
    integration: Integration tests requiring multiple components
    slow: Slow running tests (>5s)
    requires_game: Tests requiring a running game instance
    requires_cli: Tests requiring CLI tools to be available
    unit: Unit tests (default)

# Timeout for tests (seconds)
timeout = 30

# Minimum Python version
minversion = 3.10

# Test paths
testpaths = .

# Doctest options
doctest_optionflags = NORMALIZE_WHITESPACE ELLIPSIS

# Asyncio mode
asyncio_mode = auto
