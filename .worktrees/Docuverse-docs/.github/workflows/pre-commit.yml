name: Pre-commit Hooks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run gofmt
        run: |
          diff=$(gofmt -s -d .)
          if [ -n "$diff" ]; then
            echo "$diff"
            exit 1
          fi

      - name: Run go vet
        run: |
          go vet ./...

      - name: Check for secrets
        run: |
          if command -v gitleaks &> /dev/null; then
            gitleaks detect --source . --verbose --fail-on-severity high
          else
            echo "gitleaks not installed, skipping"
          fi
