repos:
  - repo: local
    hooks:
      - id: pre-commit-checks
        name: pre-commit-checks
        entry: make pre-commit
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: pre-push-checks
        name: pre-push-checks
        entry: make pre-push
        language: system
        pass_filenames: false
        stages: [pre-push]
