# Health Dashboard Configuration for Metron
# Traceability: HD-008
---
project:
  name: Metron
  language: rust
  description: Metron - Metrics and monitoring library
  tier: tier2

dimensions:
  documentation:
    weight: 15
    files:
      - CLAUDE.md  # MISSING - needs to be added
      - README.md
      - CONTRIBUTING.md
      - LICENSE
      - CHANGELOG.md
    required: true
    track_missing: true
  
  test_coverage:
    weight: 20
    thresholds:
      min_line_coverage: 80
      min_branch_coverage: 70
    codecov: false
  
  security:
    weight: 25
    scanners:
      - cargo-audit
      - cargo-deny
    alert_severity: high
  
  dependencies:
    weight: 15
    freshness_threshold_days: 90
    outdated_tolerance: 5
  
  compliance:
    weight: 15
    required_files:
      - deny.toml
      - clippy.toml
      - .pre-commit-config.yaml
    github_workflows_required: true
  
  code_quality:
    weight: 10
    linters:
      - clippy
      - rustfmt
    max_complexity: 15

alerts:
  critical_threshold: 0
  poor_threshold: 60
  frequency_hours: 24

integration:
  github_repo: KooshaPari/Metron
