name: a53-f56-gates
on:
  pull_request:
  workflow_dispatch:
jobs:
  wave-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: A53 invariant alarm (sample)
        run: |
          cat > /tmp/a53.json <<JSON
          {"checks":[{"name":"policy_hash","status":"pass"}]}
          JSON
          python3 scripts/federation/a53_cutover_invariant_alarm.py --invariants /tmp/a53.json
      - name: C53 governor stability (sample)
        run: |
          cat > /tmp/c53.json <<JSON
          {"p99_ms": 1200}
          JSON
          python3 scripts/policy/c53_governor_stability.py --metrics /tmp/c53.json --max-tail-latency 5000
