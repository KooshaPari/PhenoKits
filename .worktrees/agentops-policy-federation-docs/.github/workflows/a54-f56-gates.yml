name: a54-f56-gates
on:
  pull_request:
  workflow_dispatch:
jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: A54 sample
        run: |
          cat > /tmp/a54.json <<JSON
          {"canary_allowed_pairs": ["v1:v1", "v1:v2"]}
          JSON
          python3 scripts/federation/a54_negotiation_canary_compat.py --matrix /tmp/a54.json --pair v1:v2
      - name: E54 sample
        run: |
          cat > /tmp/e54.json <<JSON
          [{"trust_drift": false}]
          JSON
          python3 scripts/security/e54_failover_drift_alarm.py --signals /tmp/e54.json
