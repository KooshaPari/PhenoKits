name: a57-f60-gates
on:
  pull_request:
  workflow_dispatch:
jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: B57 sample
        run: |
          cat > /tmp/b57.csv <<CSV
lane,wait_variance,starved_windows
x,0.10,0
CSV
          python3 scripts/ci/b57_fairness_regression_guard.py --csv /tmp/b57.csv --max-var 0.25
      - name: D57 sample
        run: |
          cat > /tmp/d57.json <<JSON
          [{"expires_at":"2026-03-10"}]
          JSON
          python3 scripts/observability/d57_override_hardstop_gate.py --overrides /tmp/d57.json
