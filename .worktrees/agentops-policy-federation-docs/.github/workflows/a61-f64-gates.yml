name: a61-f64-gates
on:
  pull_request:
  workflow_dispatch:
jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: A61 sample
        run: |
          echo '{"cutover_drift":0.01}' > /tmp/a61.json
          python3 scripts/federation/a61_cutover_drift_budget_guard.py --metrics /tmp/a61.json
      - name: B61 sample
        run: |
          cat >/tmp/b61.csv <<CSV
lane,wait_variance
x,0.12
CSV
          python3 scripts/ci/b61_scheduler_fairness_budget_gate.py --csv /tmp/b61.csv
      - name: C61 sample
        run: |
          echo '{"replay_loop_p95_ms":240}' > /tmp/c61.json
          python3 scripts/policy/c61_replay_governor_slo_gate.py --metrics /tmp/c61.json
      - name: D61 sample
        run: |
          echo '{"override_p95_ms":800}' > /tmp/d61.json
          python3 scripts/observability/d61_override_latency_guard.py --latency /tmp/d61.json
      - name: E61 sample
        run: |
          echo '[{"updated_at":"2030-01-01T00:00:00Z"}]' > /tmp/e61.json
          python3 scripts/security/e61_attestation_freshness_slo_gate.py --attestations /tmp/e61.json
      - name: F61 sample
        run: |
          echo '{"quality_score":0.99}' > /tmp/f61.json
          python3 scripts/rollout/f61_kpi_quality_gate.py --kpi /tmp/f61.json
