name: required-check-names-guard

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate-required-check-names:
    name: validate-required-check-names
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate configured required check names exist
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          from __future__ import annotations

          import re
          import sys
          from pathlib import Path


          def parse_required_checks(path: Path) -> list[str]:
              lines = path.read_text(encoding="utf-8").splitlines()
              checks: list[str] = []
              i = 0

              while i < len(lines):
                  line = lines[i]
                  match = re.match(r"^(\s*)required_checks\s*:\s*(.*)$", line)
                  if not match:
                      i += 1
                      continue

                  base_indent = len(match.group(1))
                  tail = match.group(2).strip()

                  if tail.startswith("[") and tail.endswith("]"):
                      for token in re.findall(r"['\"]([^'\"]+)['\"]", tail):
                          checks.append(token.strip())
                      i += 1
                      continue

                  i += 1
                  while i < len(lines):
                      nxt = lines[i]
                      if not nxt.strip() or nxt.strip().startswith("#"):
                          i += 1
                          continue

                      indent = len(nxt) - len(nxt.lstrip(" "))
                      if indent <= base_indent:
                          break

                      bullet = re.match(r"^\s*-\s*(.+?)\s*$", nxt)
                      if bullet:
                          value = bullet.group(1).strip().strip("'\"")
                          if value:
                              checks.append(value)
                          i += 1
                          continue

                      break

              return checks


          def parse_workflow_checks(path: Path) -> set[str]:
              lines = path.read_text(encoding="utf-8").splitlines()
              available: set[str] = set()
              in_jobs = False

              for line in lines:
                  stripped = line.strip()
                  if not stripped or stripped.startswith("#"):
                      continue

                  if not in_jobs and re.match(r"^jobs\s*:\s*$", stripped):
                      in_jobs = True
                      continue

                  if in_jobs:
                      if re.match(r"^[A-Za-z0-9_-]+\s*:\s*$", stripped):
                          in_jobs = False
                          continue

                      job_id = re.match(r"^\s{2}([A-Za-z0-9_-]+)\s*:\s*$", line)
                      if job_id:
                          available.add(job_id.group(1))
                          continue

                      job_name = re.match(r"^\s{4}name\s*:\s*(.+?)\s*$", line)
                      if job_name:
                          name = job_name.group(1).strip().strip("'\"")
                          if name:
                              available.add(name)

              return available


          policy_files = sorted(Path("policies").rglob("*.y*ml"))
          configured_checks: list[str] = []
          for policy_file in policy_files:
              configured_checks.extend(parse_required_checks(policy_file))

          configured_unique = sorted({c for c in configured_checks if c})
          if not configured_unique:
              print("No configured required checks found under policies/. Nothing to validate.")
              sys.exit(0)

          workflow_files = sorted(Path(".github/workflows").glob("*.y*ml"))
          available_checks: set[str] = set()
          for workflow_file in workflow_files:
              available_checks.update(parse_workflow_checks(workflow_file))

          missing = sorted(set(configured_unique) - available_checks)

          print("Configured required checks:")
          for item in configured_unique:
              print(f"  - {item}")

          print("Discovered workflow check names:")
          for item in sorted(available_checks):
              print(f"  - {item}")

          if missing:
              print("Missing required check names:")
              for item in missing:
                  print(f"  - {item}")
              sys.exit(1)

          print("All configured required checks map to existing workflow check names.")
          PY
