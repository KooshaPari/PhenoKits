openapi: 3.0.3
info:
  title: Federation Policy API
  version: 0.1.0
  description: Minimal federation API for node registration, capability discovery, token exchange, and health.
servers:
  - url: https://api.example.com
paths:
  /v1/federation/nodes/register:
    post:
      summary: Register a federation node
      operationId: registerNode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeRegistrationRequest'
      responses:
        '201':
          description: Node registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeRegistrationResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/federation/capabilities:
    get:
      summary: Discover federation capabilities
      operationId: discoverCapabilities
      parameters:
        - name: org_id
          in: query
          required: true
          schema:
            type: string
        - name: harness_id
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Capabilities for tenant context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityDiscoveryResponse'
        '400':
          description: Missing or invalid tenant identifiers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/federation/token/exchange:
    post:
      summary: Exchange a subject token for federation access token
      operationId: exchangeToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenExchangeRequest'
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenExchangeResponse'
        '401':
          description: Token exchange failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/federation/health:
    get:
      summary: Health status
      operationId: federationHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
components:
  schemas:
    NodeRegistrationRequest:
      type: object
      required:
        - node_id
        - org_id
        - endpoint
      properties:
        node_id:
          type: string
        org_id:
          type: string
        harness_id:
          type: string
        endpoint:
          type: string
          format: uri
        capabilities:
          type: array
          items:
            type: string
    NodeRegistrationResponse:
      type: object
      required:
        - node_id
        - registered
      properties:
        node_id:
          type: string
        registered:
          type: boolean
        issued_at:
          type: string
          format: date-time
    CapabilityDiscoveryResponse:
      type: object
      required:
        - org_id
        - capabilities
      properties:
        org_id:
          type: string
        harness_id:
          type: string
        task_domain:
          type: string
        capabilities:
          type: array
          items:
            type: string
    TokenExchangeRequest:
      type: object
      required:
        - org_id
        - subject_token
        - grant_type
      properties:
        org_id:
          type: string
        harness_id:
          type: string
        task_domain:
          type: string
        grant_type:
          type: string
          enum:
            - urn:ietf:params:oauth:grant-type:token-exchange
        subject_token:
          type: string
        subject_token_type:
          type: string
    TokenExchangeResponse:
      type: object
      required:
        - access_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          minimum: 1
        issued_token_type:
          type: string
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
        timestamp:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
