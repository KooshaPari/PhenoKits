name: Security Guard

on:
  workflow_call:

jobs:
  ggshield-scan:
    name: ggshield secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install ggshield
        run: |
          python -m pip install --upgrade pip
          python -m pip install ggshield

      - name: Scan repository workspace
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        run: ggshield secret scan path . --recursive

      - name: Scan CI commit range
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        run: ggshield secret scan ci
