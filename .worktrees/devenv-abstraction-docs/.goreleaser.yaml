# goreleaser.yaml - Release configuration for devenv-abstraction
# Multi-platform binary distribution

project_name: devenv-abstraction
version: 0
archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - CONTRIBUTING.md
    replacements:
      darwin: Darwin
      linux: Linux
      windows: Windows
      386: i386
      amd64: x86_64
      arm64: ARM64

snapshot:
  name_template: "{{ .Tag }}-next"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Tag }}_checksums.txt"

builds:
  # macOS
  - id: macos-amd64
    goos: darwin
    goarch: amd64
    binary: devenv-abstraction

  - id: macos-arm64
    goos: darwin
    goarch: arm64
    binary: devenv-abstraction

  # Linux
  - id: linux-amd64
    goos: linux
    goarch: amd64
    binary: devenv-abstraction

  - id: linux-arm64
    goos: linux
    goarch: arm64
    binary: devenv-abstraction

  # Windows
  - id: windows-amd64
    goos: windows
    goarch: amd64
    binary: devenv-abstraction.exe

  - id: windows-arm64
    goos: windows
    goarch: arm64
    binary: devenv-abstraction.exe

env_files:
  github_token: ~/.config/goreleaser/github_token

dist: dist
gopath: /root/go
before:
  hooks:
    - go mod download
