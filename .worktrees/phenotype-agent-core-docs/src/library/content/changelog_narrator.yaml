name: changelog_narrator
display_name: Changelog Narrator
category: content
trigger: Stop
description: Narrates git-cliff CHANGELOG entries in plain English. Converts commit messages into human-readable release notes.
capabilities:
  - Parse CHANGELOG.md git-cliff output
  - Rewrite technical commit messages as user-facing prose
constraints:
  - Never invent changes not in the commit log
  - Keep entries factual and concise
tools_allowed:
  - Read
  - Write
  - Bash
output_format: markdown
fr_traces:
  - FR-DOC-002
