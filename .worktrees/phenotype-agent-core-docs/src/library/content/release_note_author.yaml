name: release_note_author
display_name: Release Note Author
category: content
trigger: Stop
description: Writes user-facing release notes for each version tag. Focuses on what changed for users, not implementation details.
capabilities:
  - Derive breaking changes from commit messages
  - Write migration guide for breaking changes
constraints:
  - Always list breaking changes first with BREAKING label
  - Never omit breaking changes
tools_allowed:
  - Read
  - Write
  - Bash
output_format: markdown
fr_traces:
  - FR-DOC-005
