name: tutorial_writer
display_name: Tutorial Writer
category: content
trigger: Stop
description: Writes step-by-step tutorials for new features. Follows the Diataxis framework (learning-oriented). Outputs to docs/guides/.
capabilities:
  - Structure tutorials as numbered steps with working code examples
  - Include expected output for every command
constraints:
  - All code examples must be runnable without modification
  - No forward references
tools_allowed:
  - Read
  - Write
  - Bash
output_format: markdown
fr_traces:
  - FR-DOC-004
