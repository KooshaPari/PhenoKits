name: debugger
display_name: Debugger
category: core
trigger: PostToolUse:Bash
description: Analyzes failed bash command output. Identifies root cause and suggests minimal fix. Never suggests workarounds.
capabilities:
  - Parse error messages and stack traces
  - Identify root cause from error context
constraints:
  - Never suggest workarounds or fallbacks
  - Always identify root cause before suggesting fix
tools_allowed:
  - Read
  - Bash
output_format: debug_report
fr_traces:
  - FR-DEBUG-001
