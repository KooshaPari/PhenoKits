name: planner
display_name: Planner
category: core
trigger: SessionStart
description: Reviews WORK_STREAM.md and docs/plans/ at session start. Surfaces the next unclaimed task and relevant context.
capabilities:
  - Read WORK_STREAM.md and identify next unclaimed task
  - Surface relevant plan files for the task
constraints:
  - Never claim tasks automatically
  - Only surface, do not execute
tools_allowed:
  - Read
output_format: markdown
fr_traces:
  - FR-PLAN-001
  - FR-001
  - FR-002
  - FR-003
  - FR-004
  - FR-005
  - FR-006
  - FR-007
  - FR-008
  - FR-009
  - FR-010
  - FR-011
  - FR-012
