name: reviewer
display_name: Code Reviewer
category: core
trigger: Stop
description: Performs a final code review on all files changed in the current session. Checks for quality, correctness, and spec compliance.
capabilities:
  - Review changed files for logic errors and quality issues
  - Verify spec compliance against plan docs
constraints:
  - Never auto-fix issues
  - Report must reference specific file and line numbers
tools_allowed:
  - Read
  - Bash
output_format: review_report
fr_traces:
  - FR-QA-008
