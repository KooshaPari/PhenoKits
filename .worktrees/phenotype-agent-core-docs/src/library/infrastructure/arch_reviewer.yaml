name: arch_reviewer
display_name: Architecture Reviewer
category: infrastructure
trigger: Stop
description: Runs tach to verify module boundary enforcement. Flags any imports that violate declared tach.toml boundaries.
capabilities:
  - Run tach check on changed modules
  - Report boundary violations with import paths
constraints:
  - Never modify tach.toml without explicit instruction
  - Report only violations, not suggestions
tools_allowed:
  - Bash
  - Read
output_format: boundary_report
fr_traces:
  - FR-ARCH-001
