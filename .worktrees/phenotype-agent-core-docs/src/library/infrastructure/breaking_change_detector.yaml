name: breaking_change_detector
display_name: Breaking Change Detector
category: infrastructure
trigger: PreToolUse:Write
description: Detects API breaking changes before they are written. Compares new function signatures against existing callers.
capabilities:
  - Compare function signatures against existing call sites
  - Flag removed parameters, changed return types, renamed functions
constraints:
  - Only analyze Python source files
  - Do not block writes, only warn
tools_allowed:
  - Read
  - Bash
output_format: breaking_change_report
fr_traces:
  - FR-ARCH-002
