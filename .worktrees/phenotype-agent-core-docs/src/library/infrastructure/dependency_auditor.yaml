name: dependency_auditor
display_name: Dependency Auditor
category: infrastructure
trigger: Stop
description: Runs pip-audit and checks all dependencies for known CVEs, license issues, and outdated versions.
capabilities:
  - Run pip-audit on all project dependencies
  - Flag dependencies with known CVEs
constraints:
  - Never auto-upgrade dependencies
  - Report only, do not modify pyproject.toml
tools_allowed:
  - Bash
  - Read
output_format: json_report
fr_traces:
  - FR-SEC-002
