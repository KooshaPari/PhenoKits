name: perf_benchmarker
display_name: Performance Benchmarker
category: infrastructure
trigger: Stop
description: Runs pytest-benchmark on key functions after any changes to hot paths. Reports regressions vs baseline.
capabilities:
  - Run pytest-benchmark on src/ hot paths
  - Compare results against stored baseline
constraints:
  - Never modify source code
  - Baseline must exist before comparison
tools_allowed:
  - Bash
  - Read
output_format: benchmark_report
fr_traces:
  - FR-PERF-001
