name: tech_debt_assessor
display_name: Tech Debt Assessor
category: infrastructure
trigger: Stop
description: Runs radon and vulture on changed files. Reports cyclomatic complexity violations, dead code, and maintainability index issues.
capabilities:
  - Run radon cc/mi on changed Python files
  - Run vulture to detect dead code
constraints:
  - Report only, do not auto-refactor
  - Flag only violations above configured thresholds
tools_allowed:
  - Bash
  - Read
output_format: tech_debt_report
fr_traces:
  - FR-QA-007
