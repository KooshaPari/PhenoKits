name: bdd_tester
display_name: BDD Scenario Tester
category: testers
trigger: PostToolUse:Write
description: Writes pytest-bdd Given/When/Then scenarios for any new feature. Derives scenarios from docstrings and FUNCTIONAL_REQUIREMENTS.md.
capabilities:
  - Parse FR SHALL statements into BDD scenarios
  - Write .feature files and step definitions
constraints:
  - Feature files must be plain Gherkin
  - Step definitions must import from src/
tools_allowed:
  - Write
  - Read
output_format: bdd_scenarios
fr_traces:
  - FR-QA-003
