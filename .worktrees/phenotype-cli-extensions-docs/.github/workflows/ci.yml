name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
        working-directory: src/shell-tool-mcp
      - name: Lint
        run: pnpm run lint
        working-directory: src/shell-tool-mcp
      - name: Test
        run: pnpm test
        working-directory: src/shell-tool-mcp
      - name: Build
        run: pnpm run build
        working-directory: src/shell-tool-mcp
