version: "0.5"

# phenotype-dep-guard - Rust CLI tool
# Native-first local development orchestration

environment:
  - RUST_BACKTRACE=1
  - RUST_LOG=info,phenotype_dep_guard=debug

processes:
  build:
    command: cargo build --release
    depends_on: {}
    log_location: .logs/build.log

  test:
    command: cargo test --workspace
    depends_on: {}
    log_location: .logs/test.log

  clippy:
    command: cargo clippy --workspace -- -D warnings
    depends_on: {}
    log_location: .logs/clippy.log

  dev:
    command: cargo run --bin dep-guard --watch
    depends_on: {}
    log_location: .logs/dev.log

  bench:
    command: cargo bench --workspace
    depends_on: {}
    log_location: .logs/bench.log

  # Integration test with sample projects
  integration:
    command: cargo test --test integration
    depends_on: {}
    log_location: .logs/integration.log
