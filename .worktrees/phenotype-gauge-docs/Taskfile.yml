version: '3'
tasks:
  build:
    desc: Build the project
    cmds:
      - cargo build
  test:
    desc: Run tests
    cmds:
      - cargo test
  lint:
    desc: Run clippy linter
    cmds:
      - cargo clippy -- -D warnings
  fmt:
    desc: Format code
    cmds:
      - cargo fmt
  check:
    desc: Check compilation
    cmds:
      - cargo check
  quality:
    desc: Run all quality checks
    deps: [fmt, lint, test]
  docs:build:
    desc: Build documentation
    cmds:
      - cargo doc --no-deps
