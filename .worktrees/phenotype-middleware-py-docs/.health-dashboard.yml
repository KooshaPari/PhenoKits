# Health Dashboard Configuration for phenotype-middleware-py
# Traceability: HD-014
---
project:
  name: phenotype-middleware-py
  language: python
  description: Phenotype Middleware - Python middleware components
  tier: tier2

dimensions:
  documentation:
    weight: 15
    files:
      - CLAUDE.md
      - README.md
      - CONTRIBUTING.md
      - LICENSE
      - CHANGELOG.md  # MISSING - needs to be added
    required: true
    track_missing: true
  
  test_coverage:
    weight: 20
    thresholds:
      min_line_coverage: 80
      min_branch_coverage: 70
    test_framework: pytest
  
  security:
    weight: 25
    scanners:
      - pip-audit
      - bandit
      - snyk
    alert_severity: high
  
  dependencies:
    weight: 15
    freshness_threshold_days: 90
    outdated_tolerance: 5
  
  compliance:
    weight: 15
    required_files:
      - pyproject.toml
      - ruff.toml
      - .pre-commit-config.yaml
    github_workflows_required: true
  
  code_quality:
    weight: 10
    linters:
      - ruff
      - mypy
    max_complexity: 15

alerts:
  critical_threshold: 0
  poor_threshold: 60
  frequency_hours: 24

integration:
  github_repo: KooshaPari/phenotype-middleware-py
