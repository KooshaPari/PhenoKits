name: Docs Evidence Gate

on:
  push:
    paths:
      - 'phenotype-nexus/docs/**'
  pull_request:
    paths:
      - 'phenotype-nexus/docs/**'

jobs:
  run-gate:
    name: Run docs evidence gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm install
        working-directory: phenotype-nexus/docs
      - name: Run docs:evidence
        run: npm run docs:evidence
        working-directory: phenotype-nexus/docs
