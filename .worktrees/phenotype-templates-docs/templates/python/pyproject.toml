[project]
name = "{{project-name}}"
version = "0.1.0"
description = "{{project-description}}"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "{{author-name}}", email = "{{author-email}}" }
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.0",
    "pytest-asyncio>=0.23",
    "pytest-mock>=3.12",
    "ruff>=0.3",
    "mypy>=1.8",
    "pre-commit>=3.6",
]
api = [
    "fastapi>=0.109",
    "uvicorn[standard]>=0.27",
    "pydantic>=2.5",
]
cli = [
    "typer>=0.12",
    "rich>=13.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# Linting configuration - for full config see .ruff.toml in template-commons
[tool.ruff]
target-version = "py311"
line-length = 100
select = ["E", "W", "F", "I", "C", "B", "UP", "RUF", "ANN"]
ignore = ["E501", "ANN101", "ANN102"]

[tool.ruff.per-file-ignores]
"tests/*" = ["B011", "S101", "ANN"]
"src/__init__.py" = ["F401"]

# Type checking - for full config see mypy.ini in template-commons
[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false

# Pytest configuration - for full config see pytest.ini in template-commons
[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
addopts = "-v --tb=short"

# Coverage - for full config see .coveragerc in template-commons
[tool.coverage.run]
source = ["src"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]
