name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: pip install uv
      - name: Install package
        run: |
          uv pip install -e .
          uv pip install pytest pytest-cov mypy ruff
      - name: Type check
        run: uvx mypy phenotype_types/
      - name: Lint
        run: uvx ruff check .
      - name: Format check
        run: uvx ruff format --check .
      - name: Test
        run: uvx pytest
