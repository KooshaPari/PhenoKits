version: "0.5"

# phenotype-xdd-lib - Rust library
# Native-first local development orchestration

environment:
  - RUST_BACKTRACE=1
  - RUST_LOG=info

processes:
  build:
    command: cargo build --release
    depends_on: {}
    log_location: .logs/build.log

  test:
    command: cargo test --workspace
    depends_on: {}
    log_location: .logs/test.log

  clippy:
    command: cargo clippy --workspace -- -D warnings
    depends_on: {}
    log_location: .logs/clippy.log

  doc:
    command: cargo doc --workspace --no-deps
    depends_on: {}
    log_location: .logs/doc.log

  # Property-based testing
  prop-test:
    command: cargo test --test property_tests
    depends_on: {}
    log_location: .logs/prop-test.log

  bench:
    command: cargo bench --workspace
    depends_on: {}
    log_location: .logs/bench.log
