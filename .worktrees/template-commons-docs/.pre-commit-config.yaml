repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-ast  # Verify Python syntax
      - id: check-docstring-first  # Docstrings at start of files
  - repo: local
    hooks:
      - id: security-guard-pre-commit
        name: security-guard pre-commit
        entry: .github/scripts/security-guard.sh
        language: script
        pass_filenames: false
        stages: [pre-commit]
      - id: pre-push-validate
        name: pre-push validate
        entry: .github/scripts/pre-push-validate.sh
        language: script
        pass_filenames: false
        stages: [pre-push]
        always_run: true
