# Ruff configuration for Python projects
# See: https://docs.astral.sh/ruff/configuration/

# Target Python version
target-version = "py311"

# Line length (matches editorconfig)
line-length = 100

# Select rules
select = [
    "E",     # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "C",      # flake8-comprehensions
    "B",      # flake8-bugbear
    "UP",     # pyupgrade
    "RUF",    # Ruff-specific rules
    "ANN",    # flake8-annotations
    "DTZ",    # flake8-datetimez
    "T10",    # flake8-debugger
    "ISC",    # flake8-implicit-str-concat
    "PIE",    # flake8-pie
    "RET",    # flake8-return
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "PTH",    # flake8-use-pathlib
]

# Ignore rules
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults
    "ANN101", # missing-type-self
    "ANN102", # missing-type-cls
    "ANN401", # dynamically typed attributes
    "T201",   # print found in source
    "ISC001", # may cause conflicted rules
]

# Per-file ignores
[tool.ruff.per-file-ignores]
"tests/*" = ["B011", "S101", "ANN", "T201"]
"src/__init__.py" = ["F401"]
"examples/*" = ["ANN", "T201"]

# Rule-specific configurations
[tool.ruff.lint.isort]
force-single-line = false
combine-as-imports = true

[tool.ruff.lint.pyupgrade]
keep-percent-format = true

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
