version: "0.5"

# Native-first local development orchestration
# Uses system packages where available, falls back to containers only when needed

environment:
  - RUST_BACKTRACE=1
  - RUST_LOG=info

processes:
  # ============================================================
  # Build & Watch (Rust native)
  # ============================================================
  build:
    command: cargo build
    depends_on: {}
    log_location: .logs/build.log

  test:
    command: cargo test
    depends_on: {}
    log_location: .logs/test.log

  clippy:
    command: cargo clippy --workspace -- -D warnings
    depends_on: {}
    log_location: .logs/clippy.log

  bench:
    command: cargo bench
    depends_on: {}
    log_location: .logs/bench.log

  doc:
    command: cargo doc --no-deps
    depends_on: {}
    log_location: .logs/doc.log

  # ============================================================
  # Development server (per-crate)
  # ============================================================
  dev:
    command: cargo run --watch
    depends_on: {}
    log_location: .logs/dev.log
    readiness_probe:
      exec:
        command: pgrep -f "cargo run"
      initial_delay_seconds: 5
      period_seconds: 5
      failure_threshold: 3
