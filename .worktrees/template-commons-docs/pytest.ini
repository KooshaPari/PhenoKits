# pytest configuration for Python projects
# See: https://docs.pytest.org/en/stable/reference/customize.html

[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers for test categorization
markers =
    unit: Unit tests that run in isolation without external dependencies
    integration: Integration tests that may call external services
    e2e: End-to-end tests that test the full application
    slow: Tests that take longer than 5 seconds
    fast: Tests that complete in under 1 second
    smoke: Quick smoke tests for sanity checking

# Warnings
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestCollectionWarning

# Coverage
[coverage:run]
branch = True
source = src
omit =
    */tests/*
    */test_*.py
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
