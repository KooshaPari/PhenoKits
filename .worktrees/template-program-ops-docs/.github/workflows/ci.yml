name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate template contract and orchestration scripts
        run: |
          ./scripts/scaffold-smoke.sh
          test -f contracts/template.manifest.json
          test -f contracts/reconcile.rules.yaml
          test -x scripts/validate-foundation.sh
          test -x scripts/validate-domains.sh
