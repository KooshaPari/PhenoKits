# Pre-commit Configuration Base Template
# Location: thegent/dotfiles/hooks/.pre-commit-config.base.yaml
#
# This is the canonical base template for .pre-commit-config.yaml files
# across the Phenotype ecosystem.
#
# USAGE:
# 1. Copy this file to your project root as .pre-commit-config.yaml
# 2. Customize sections marked [CUSTOMIZE] for your project
# 3. Keep [UNIVERSAL] sections unchanged (common to all projects)
# 4. Include language-specific sections for your tech stack
# 5. Add local hooks for project-specific checks
#
# VERSION: 1.0 (2026-03)

# ============================================================================
# GATE 1: Base Syntax & Format Validation (UNIVERSAL — all projects)
# ============================================================================

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Trailing whitespace
      - id: trailing-whitespace
        stages: [pre-commit, pre-push]

      # EOF fixer
      - id: end-of-file-fixer
        stages: [pre-commit, pre-push]

      # YAML validation
      - id: check-yaml
        stages: [pre-commit, pre-push]
        # [CUSTOMIZE] Add excludes if needed:
        # exclude: |
        #   (?x)^(
        #     templates/.*\.ya?ml$
        #   )$
        args: ["--unsafe"]

      # TOML validation
      - id: check-toml
        stages: [pre-commit, pre-push]

      # JSON validation
      - id: check-json
        stages: [pre-commit, pre-push]
        # [CUSTOMIZE] Exclude test outputs and vendor files:
        exclude: |
          (?x)^(
            node_modules/.+|
            \.venv/.+|
            test_output\.json
          )$

      # Merge conflict detection
      - id: check-merge-conflict
        stages: [pre-commit, pre-push]

      # Large file detection
      - id: check-added-large-files
        stages: [pre-commit, pre-push]
        args: ["--maxkb=500"]

      # Private key detection
      - id: detect-private-key
        stages: [pre-commit, pre-push]
        # [CUSTOMIZE] Add exclusions for test fixtures:
        # exclude: |
        #   (?x)^(
        #     tests/data/.*\.pem|
        #     test_fixtures/.*\.key
        #   )$

      # Prevent commits to main/master
      - id: no-commit-to-branch
        stages: [pre-commit, pre-push]
        args: ["--branch", "main", "--branch", "master"]

      # Python AST validation
      - id: check-ast
        stages: [pre-commit, pre-push]

# ============================================================================
# Conventional Commits Validation
# ============================================================================

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - docs
          - style
          - refactor
          - perf
          - test
          - chore
          - ci
          - build
          - revert

# ============================================================================
# GATE 2: Linting & Formatting
# Language-Specific: Include sections for your tech stack
# ============================================================================

# --- Python (ruff) ---
# [INCLUDE if using Python]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.10.0
    hooks:
      - id: ruff
        stages: [pre-commit, pre-push]
        args: ["--fix"]

      - id: ruff-format
        stages: [pre-commit, pre-push]

# --- Rust (rustfmt + clippy) ---
# [INCLUDE if using Rust]
# NOTE: These are local hooks; adjust path to your workspace
  - repo: local
    hooks:
      - id: rustfmt
        name: rustfmt
        entry: bash -c 'cd rust && cargo fmt -- --check'
        language: system
        files: '\.rs$'
        pass_filenames: false
        stages: [pre-commit, pre-push]

      - id: clippy
        name: clippy
        entry: bash -c 'cd rust && cargo clippy --all-targets -- -D warnings'
        language: system
        files: '\.rs$'
        pass_filenames: false
        stages: [pre-commit, pre-push]

# --- TypeScript/JavaScript (oxlint + prettier) ---
# [INCLUDE if using TypeScript/JavaScript]
  - repo: local
    hooks:
      - id: oxlint
        name: oxlint
        entry: bash -c 'oxlint --fix .'
        language: system
        files: '\.(ts|tsx|js|jsx)$'
        pass_filenames: false
        stages: [pre-commit, pre-push]

      - id: prettier
        name: prettier
        entry: bash -c 'prettier --write .'
        language: system
        files: '\.(ts|tsx|js|jsx|json|yaml|md)$'
        pass_filenames: false
        stages: [pre-commit, pre-push]

# --- Go (gofmt + golangci-lint) ---
# [INCLUDE if using Go]
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: bash -c 'go fmt ./...'
        language: system
        files: '\.go$'
        pass_filenames: false
        stages: [pre-commit, pre-push]

      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run
        language: system
        files: '\.go$'
        pass_filenames: false
        stages: [pre-commit, pre-push]

# --- Proto (buf) ---
# [INCLUDE if using Protocol Buffers]
  - repo: local
    hooks:
      - id: buf-lint
        name: buf lint
        entry: buf lint
        language: system
        files: '\.proto$'
        pass_filenames: false
        stages: [pre-commit, pre-push]

# ============================================================================
# Secret Detection
# ============================================================================

  - repo: local
    hooks:
      # TruffleHog: Production-grade secret scanning
      - id: trufflehog
        name: TruffleHog Secret Detection
        entry: trufflehog git file://. --since-commit HEAD --only-verified --fail
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]

# ============================================================================
# GATE 3: Type Checking (Language-specific)
# ============================================================================

# --- Python: basedpyright strict type checking ---
# [INCLUDE if using Python with strict typing]
  - repo: local
    hooks:
      - id: basedpyright
        name: basedpyright (Strict Type Check)
        entry: scripts/typecheck_changed.sh basedpyright
        language: system
        types: [python]
        pass_filenames: true
        stages: [pre-push]

# --- TypeScript: tsc ---
# [INCLUDE if using TypeScript]
  - repo: local
    hooks:
      - id: tsc
        name: TypeScript Compiler
        entry: bash -c 'tsc --noEmit'
        language: system
        files: '\.(ts|tsx)$'
        pass_filenames: false
        stages: [pre-push]

# ============================================================================
# GATE 4: Quality Gates & Custom Checks
# ============================================================================

  - repo: local
    hooks:
      # File size check
      - id: max-lines-check
        name: Max Lines Check (500 LOC per file)
        entry: |
          bash -c 'for f in "$@"; do
            lines=$(wc -l < "$f" 2>/dev/null || echo 0)
            if [ "$lines" -gt 500 ]; then
              echo "ERROR: $f has $lines lines (max 500)"
              exit 1
            fi
          done' --
        language: system
        types: [python]
        stages: [pre-commit]
        exclude: ^(tests/|\.venv|.*_test\.py$)

      # [CUSTOMIZE] Add project-specific local hooks here:
      # Example: documentation build verification
      # - id: docs-build
      #   name: Build Documentation
      #   entry: bash hooks/pre-commit-docs.sh
      #   language: script
      #   pass_filenames: false
      #   files: '^docs/'
      #   stages: [pre-push]

      # Example: shell script validation
      - id: shellcheck
        name: ShellCheck
        entry: shellcheck
        language: system
        files: '\.sh$'
        types: [shell]
        stages: [pre-commit, pre-push]

# ============================================================================
# GATE 5: Security & Governance
# ============================================================================

  - repo: local
    hooks:
      # [CUSTOMIZE] Security guard script (adjust path as needed)
      - id: security-guard
        name: Security Guard Check
        entry: bash .github/scripts/security-guard.sh
        language: script
        pass_filenames: false
        stages: [pre-commit, pre-push]

      # [CUSTOMIZE] Governance policy check (if using policies)
      # - id: governance-policy
      #   name: Governance Policy Check
      #   entry: bash scripts/governance_policy_check.sh
      #   language: system
      #   pass_filenames: false
      #   stages: [pre-push]

# ============================================================================
# Documentation & Notes
# ============================================================================

# CUSTOMIZATION GUIDE:
#
# 1. Universal Sections (keep as-is):
#    - Base syntax validation (trailing-whitespace, check-yaml, etc.)
#    - Conventional commits
#    - Secret detection (TruffleHog)
#    - Merge conflict detection
#
# 2. Language-Specific (include what applies):
#    - Python: ruff (lint + format), basedpyright (type check)
#    - Rust: rustfmt, clippy
#    - TypeScript: oxlint, prettier, tsc
#    - Go: gofmt, golangci-lint
#    - Proto: buf lint
#
# 3. Project-Specific (add local hooks):
#    - Documentation building
#    - Custom linters
#    - Integration tests
#    - Architecture validation
#
# 4. Stages:
#    - pre-commit: Run on every commit
#    - pre-push: Run before pushing to remote
#    - commit-msg: Run on commit message (e.g., conventional-pre-commit)
#
# TESTING YOUR CONFIG:
#   pre-commit run --all-files          # Run all hooks on all files
#   pre-commit run <hook-id> --all      # Run specific hook
#   pre-commit install                  # Install git hooks
#   pre-commit uninstall                # Remove git hooks
#
# SKIPPING HOOKS:
#   SKIP=hook-id git commit -m "msg"    # Skip specific hook
#   git commit --no-verify -m "msg"     # Skip all pre-commit hooks
#
# Learn more: https://pre-commit.com
