# --- VALIDATION RULES ---
validation:
  required_files:
    - README.md
    - Cargo.toml | go.mod | package.json | pyproject.toml
    - src/ | lib/ | app/
  
  spec_linking:
    required: true
    pattern: "SPEC-[A-Z]+-[0-9]+"
  
  pattern_linking:
    required: false
    pattern: "patterns/[a-z-]+/[a-z-]+.md"

# --- CLI INTEGRATION ---
cli:
  command: "hexakit"
  install: "cargo install hexakit-cli"
  
  usage: |
    # List templates
    hexakit list --category by-language
    
    # Create from template
    hexakit create go-hexagonal my-service
    
    # Validate template
    hexakit validate ./my-template
    
    # Update from upstream
    hexakit update my-service
