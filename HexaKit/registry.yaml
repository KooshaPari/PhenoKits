# HexaKit Template Registry
# Central registry for templates with metadata and links to specs/patterns

registry_version: "1.0.0"
last_updated: "2026-04-04"

# --- TEMPLATE CATEGORIES ---
categories:
  by_language:
    name: "Language Templates"
    description: "Hexagonal architecture templates by programming language"
    path: "by-language/"
  
  by_project:
    name: "Project Templates"
    description: "Complete project templates for different use cases"
    path: "by-project/"
  
  by_architecture:
    name: "Architecture Templates"
    description: "Templates following specific architectural patterns"
    path: "by-architecture/"
  
  by_domain:
    name: "Domain Templates"
    description: "Templates for specific domains (auth, caching, etc.)"
    path: "by-domain/"

