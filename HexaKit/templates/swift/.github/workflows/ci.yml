name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y swift
      - run: |
          REQUIRE_SWIFT=1 bash scripts/scaffold-smoke.sh
