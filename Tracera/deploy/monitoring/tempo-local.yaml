server:
  http_listen_address: 127.0.0.1
  http_listen_port: 3200
  grpc_listen_address: 127.0.0.1
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 127.0.0.1:4317
        http:
          endpoint: 127.0.0.1:4318

storage:
  trace:
    backend: local
    wal:
      path: .tempo/wal
    local:
      path: .tempo/blocks

compactor:
  compaction:
    block_retention: 24h
