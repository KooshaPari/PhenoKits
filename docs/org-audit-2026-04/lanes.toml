# org-audit-2026-04 lanes configuration
# Defines audit lanes for FocalPoint agent-orchestrator
# Excludes: FocalPoint, AgilePlus, Tracera, thegent, HeliosLab, heliosApp, heliosCLI, PhenoLibs, PhenoKits, phenotype-infrakit, cloud, KDesktopVirt, Civis, canvasApp, PolicyStack

[[lanes]]
id = "AgentMCP"
scope = "repos/AgentMCP/**"
prompt = """Conduct a 10-dimensional audit of the AgentMCP repository:
1. **Build & Compilation**: Can it build cleanly? Any warnings, broken dependencies, or version conflicts?
2. **Test Coverage**: Presence of test suite? Coverage percentage? Test framework used? Maintainability?
3. **CI/CD Pipeline**: GitHub Actions, other CI? Pass rate? Coverage/lint enforcement?
4. **Documentation**: README quality, API docs, getting started guide, architecture diagrams?
5. **Architectural Debt**: Dead code, monolithic files, anti-patterns, code duplication?
6. **FR Traceability**: Are functional requirements in FUNCTIONAL_REQUIREMENTS.md? Do tests reference FR IDs?
7. **Velocity & Release**: Commit frequency, release cadence, versioning strategy (SemVer/CalVer)?
8. **Governance**: CLAUDE.md present? Contributing guidelines? Code of conduct?
9. **Dependencies**: External dependencies count, pinned versions? Any high-risk/unmaintained deps?
10. **Honest Assessment**: What is fundamentally broken or missing? What's the minimal viable fix?

Output format: markdown report (each dimension as section, 2-3 paragraph summary, status: SHIPPED/SCAFFOLD/BROKEN)."""

