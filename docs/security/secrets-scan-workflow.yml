# Sample: .github/workflows/secrets-scan.yml
# Deploy to all repos: .github/workflows/secrets-scan.yml

name: Secrets Scan (Trufflehog)

on:
  schedule:
    # Nightly scan at 2 AM UTC
    - cron: '0 2 * * *'
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  trufflehog:
    name: Detect Secrets
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Run Trufflehog (verified-only)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch || 'main' }}
          head: HEAD
          extra_args: --only-verified --debug

      - name: Comment on PR (if secrets found)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Secrets Scan Alert**: Trufflehog detected potential secrets. Review the scan logs above and rotate credentials if needed.'
            })

  workflow-summary:
    name: Scan Summary
    needs: trufflehog
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report Results
        run: |
          if [[ "${{ needs.trufflehog.result }}" == "success" ]]; then
            echo "✅ Secrets scan passed: no verified secrets found."
          else
            echo "⚠️ Secrets scan detected findings. Review logs above."
          fi
