# cargo-nextest configuration for Phenotype
# Parallel test execution with better filtering

[profile.phenotype]
# Test timeout
timeout = { per_test = 120, per_item = 60 }

# Output
formatter = "pretty"
failure-output = "immediate"

# Show skipped tests
show_skipped = true

# Don't fail fast - run all tests
fail-fast = false

# Soft retries for CI
retries = 1

[[profile.phenotype.overrides]]
filter = "test(~lib::)"
threads = 1

[[profile.phenotype.overrides]]
filter = "test(integration::)"
retries = 2

[[profile.phenotype.overrides]]
filter = "test(slow::)"
retries = 3
timeout = { per_test = 600 }

# CI profile override
[profile.phenotype.ci]
fail-fast = true
retries = 2
timeout = { per_test = 120, per_item = 60 }
