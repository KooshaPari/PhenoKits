name: Python CI

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: '3.11'
      test-runner:
        required: false
        type: string
        default: 'pytest'
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      
      - name: Lint with ruff
        run: ruff check src tests
      
      - name: Format check
        run: ruff format --check src tests
      
      - name: Type check
        run: mypy src
      
      - name: Run tests
        run: pytest --cov=src --cov-report=xml
