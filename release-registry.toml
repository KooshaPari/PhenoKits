[collection]
name = "phenotype-shared"
version = "0.1.0"
repo = "https://github.com/phenotype-dev/phenotype-shared"
description = "Rust infrastructure toolkit: domain-driven design, hexagonal architecture, clean separation"
authors = ["Phenotype Team <team@phenotype.dev>"]
license = "MIT"
theme = "shared infrastructure"

